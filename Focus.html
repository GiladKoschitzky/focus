<style>
:root{
  /* dark theme (default) */
  --bg:#0c0d10;
  --panel:#15161b;
  --panel2:#1c1e25;
  --line:#2a2c35;
  --txt:#e9e8e4;
  --dim:#8a8b94;
  --faint:#54565f;
  --accent:#e0a458;        /* warm amber — app signature */
  --accent2:#d3713f;
  --focus:#5b8fb0;         /* focus-vibe (editable) */
  --break:#7fae8a;         /* break-vibe (editable) */
  --good:#6fbf73;
  --bad:#d8624f;
  --radius:16px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Spline Sans',system-ui,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}
[data-theme="light"]{
  --bg:#f3f1ea;
  --panel:#ffffff;
  --panel2:#f7f5ef;
  --line:#e0ddd2;
  --txt:#1f2024;
  --dim:#6a6b73;
  --faint:#a8a69c;
  --accent:#c8862f;
  --accent2:#b65a2a;
  --focus:#4a7da0;
  --break:#5f9a6c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--txt);font-family:var(--sans);
  transition:background .4s,color .4s;
}
button{font-family:inherit;color:inherit}

#app{display:flex;flex-direction:column;height:100%;width:100%;max-width:100%;margin:0;position:relative}

/* ===== header ===== */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(13px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 12px calc(18px + env(safe-area-inset-left));
  border-bottom:1px solid var(--line);background:var(--panel);z-index:20;
}
.brand{font-family:var(--serif);font-weight:900;letter-spacing:.16em;font-size:16px;display:flex;align-items:center;gap:10px}
.brand .pip{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.hbtns{display:flex;align-items:center;gap:8px}
.iconbtn{background:none;border:1px solid var(--line);color:var(--dim);width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.iconbtn:hover{color:var(--accent);border-color:var(--accent)}
.iconbtn svg{width:17px;height:17px}

main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.page{padding:22px 18px 30px;animation:fade .4s ease;max-width:920px;margin:0 auto}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== bottom nav ===== */
nav{display:flex;border-top:1px solid var(--line);background:var(--panel);z-index:20;width:100%;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--faint);padding:11px 0;cursor:pointer;
  font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:5px;transition:.2s}
nav button.on{color:var(--accent)}
nav button{position:relative}
nav button.badged::after{content:'';position:absolute;top:7px;right:calc(50% - 18px);width:7px;height:7px;border-radius:50%;background:var(--bad);box-shadow:0 0 8px var(--bad);animation:pulse-dot 1.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
nav button svg{width:21px;height:21px}

/* ===== generic ui ===== */
h1.ptitle{font-family:var(--serif);font-size:clamp(28px,7vw,38px);font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.psub{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.btn{background:var(--accent);color:#0c0d10;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.03em;padding:14px;border:none;border-radius:12px;cursor:pointer;transition:.2s;width:100%}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--txt);border-color:var(--accent)}
.btn.sm{width:auto;padding:9px 16px;font-size:12px}
.fld{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:14px;padding:12px;border-radius:11px}
.fld:focus{outline:none;border-color:var(--accent)}
/* kill native number spinners everywhere */
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
/* custom stepper */
.stepper{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--bg)}
.stepper button{width:48px;background:var(--panel2);border:none;color:var(--accent);font-size:20px;font-family:var(--mono);cursor:pointer;transition:.15s}
.stepper button:hover{background:color-mix(in srgb,var(--accent) 16%,var(--panel2))}
.stepper input{flex:1;background:none;border:none;color:var(--txt);font-family:var(--mono);font-size:17px;font-weight:700;text-align:center;padding:12px 0}
.stepper input:focus{outline:none}
/* custom select */
.selwrap{position:relative}
.selwrap select{width:100%;-webkit-appearance:none;appearance:none;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:14px;padding:12px 40px 12px 12px;border-radius:11px;cursor:pointer}
.selwrap select:focus{outline:none;border-color:var(--accent)}
.selwrap .selarrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--dim);pointer-events:none}
/* fully custom category dropdown */
.csel{position:relative}
.csel-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:14px;padding:12px;border-radius:11px;cursor:pointer;transition:.15s}
.csel-btn:hover{border-color:var(--accent)}
.csel-btn .selarrow{width:16px;height:16px;color:var(--dim);transition:transform .2s}
.csel-list{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);border:1px solid var(--line);border-radius:12px;z-index:10;overflow:hidden;box-shadow:0 12px 36px rgba(0,0,0,.45);max-height:260px;overflow-y:auto}
.csel-list.open{display:block;animation:fade .15s}
.csel-opt{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--txt);font-family:var(--mono);font-size:13.5px;padding:11px 13px;cursor:pointer;text-align:left;transition:.12s}
.csel-opt:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.csel-opt.on{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
.csel-opt.addrow{color:var(--dim);border-top:1px solid var(--line)}
.inline-add{display:flex;gap:7px;padding:9px 11px;border-top:1px solid var(--line);align-items:center}
.inline-add input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:13px;padding:9px 10px;border-radius:8px;min-width:0}
.inline-add input:focus{outline:none;border-color:var(--accent)}
.ia-swatch{width:34px;height:34px;border-radius:8px;border:2px solid var(--line);cursor:pointer;flex:0 0 auto;transition:.15s}
.ia-swatch:hover{transform:scale(1.06)}
.ia-go{background:var(--accent);color:#0c0d10;border:none;border-radius:8px;padding:0 14px;height:34px;font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;flex:0 0 auto}
/* date field */
.datefld{cursor:pointer;color-scheme:dark}
[data-theme="light"] .datefld{color-scheme:light}
.datefld::-webkit-calendar-picker-indicator{filter:var(--cal-filter);cursor:pointer;opacity:.7}
:root{--cal-filter:invert(.7)}
[data-theme="light"]{--cal-filter:none}
/* custom date picker */
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dp-title{font-family:var(--serif);font-size:19px;font-weight:600}
.dp-nav{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--accent);font-size:20px;cursor:pointer;transition:.15s}
.dp-nav:hover{border-color:var(--accent)}
.dp-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.dp-dow span{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dp-day{aspect-ratio:1;border:none;background:var(--panel2);border-radius:9px;color:var(--txt);font-family:var(--mono);font-size:13px;cursor:pointer;transition:.12s}
.dp-day:hover{background:color-mix(in srgb,var(--accent) 22%,var(--panel2))}
.dp-day.today{border:1px solid var(--accent);color:var(--accent)}
.dp-day.sel{background:var(--accent);color:#0c0d10;font-weight:700}

/* ===== custom scrollbar ===== */
*{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}
label.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:7px}

/* ===== FOCUS setup ===== */
.setup-grid{display:grid;gap:14px}
.interval-set{display:flex;gap:12px}
.interval-set>div{flex:1}
.dur-input{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.dur-input input{width:100%;background:none;border:none;color:var(--txt);font-family:var(--mono);font-size:20px;font-weight:700;text-align:center;-moz-appearance:textfield}
.dur-input input::-webkit-outer-spin-button,.dur-input input::-webkit-inner-spin-button{-webkit-appearance:none}
.dur-input span{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase}

.cat-pick{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{font-family:var(--mono);font-size:12px;padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;transition:.18s;display:flex;align-items:center;gap:7px}
.cat-chip .cdot{width:9px;height:9px;border-radius:50%}
.cat-chip.on{border-color:var(--catc,var(--accent));color:var(--txt);background:color-mix(in srgb,var(--catc,var(--accent)) 14%,transparent)}
.cat-chip.add{border-style:dashed;color:var(--faint)}

.task-pick-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.15s}
.task-pick-row.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,transparent)}
.task-pick-row .tcheck{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0c0d10}
.task-pick-row.on .tcheck{background:var(--accent);border-color:var(--accent)}
.task-pick-row .tname{flex:1;font-size:14px}
.task-pick-row .tmeta{font-family:var(--mono);font-size:10.5px;color:var(--faint)}

/* ===== FOCUS MODE (the locked-in screen) ===== */
#focusMode{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;
  background:var(--bg);color:var(--txt);
  /* hue tint overlays via ::before */
}
#focusMode.show{display:flex;animation:fade .35s}
#focusMode::before{content:'';position:absolute;inset:0;pointer-events:none;transition:background 1.2s ease;z-index:0;
  background:color-mix(in srgb,var(--phase) 6%,transparent);}
#focusMode.phase-focus{--phase:var(--focus)}
#focusMode.phase-break{--phase:var(--break)}
#focusMode.dimmed{filter:brightness(.62);transition:filter .8s}
.fm-top{display:flex;justify-content:space-between;align-items:flex-start;padding:calc(20px + env(safe-area-inset-top)) 22px 0;z-index:2}
.fm-stats{font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--dim)}
.fm-stats b{color:var(--txt);font-weight:700}
.fm-ctrls{display:flex;gap:8px}
.fm-ctrls button{background:color-mix(in srgb,var(--panel) 80%,transparent);border:1px solid var(--line);color:var(--dim);border-radius:10px;padding:9px 12px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.fm-ctrls button:hover{color:var(--txt);border-color:var(--phase,var(--accent))}
.fm-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;gap:18px}
.fm-phase-label{font-family:var(--mono);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--phase,var(--accent))}
.fm-timer{font-family:var(--mono);font-size:clamp(40px,11vw,72px);font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.fm-ring{position:relative;width:min(70vw,300px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.fm-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.fm-ring .track{fill:none;stroke:var(--line);stroke-width:2.5}
.fm-ring .prog{fill:none;stroke:var(--phase,var(--accent));stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .9s linear}
.fm-flip{margin-top:6px;background:var(--phase,var(--accent));color:#0c0d10;border:none;border-radius:12px;padding:13px 26px;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.05em;cursor:pointer;transition:.2s}
.fm-flip:active{transform:scale(.97)}
.fm-flip.skip{background:transparent;color:var(--phase,var(--accent));border:1px solid var(--phase,var(--accent))}

/* magazine (right vertical strip on laptop) */
.fm-mag{position:absolute;top:0;right:0;bottom:0;width:230px;background:color-mix(in srgb,var(--panel) 85%,transparent);border-left:1px solid var(--line);padding:calc(20px + env(safe-area-inset-top)) 14px 16px;overflow-y:auto;z-index:3;backdrop-filter:blur(6px)}
.fm-mag h4{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.mag-task{padding:10px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s}
.mag-task:hover{border-color:var(--accent)}
.mag-task.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.mag-task .mt-name{font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
.mag-task .mt-name small{font-family:var(--mono);color:var(--faint);font-size:10px;white-space:nowrap}
.mag-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.mag-bar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

/* current task bottom-right */
.fm-current{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));right:244px;width:300px;max-width:38vw;z-index:2}
.fm-current .ct-name{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:8px}
.fm-current .ct-count{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:8px}
.fm-current .ct-bar{height:9px;background:var(--line);border-radius:5px;overflow:hidden}
.fm-current .ct-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .35s cubic-bezier(.22,1,.36,1)}
.fm-current .ct-hint{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:8px}
.ct-done{margin-top:11px;background:none;border:1px solid var(--good);color:var(--good);font-family:var(--mono);font-size:12px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.15s}
.ct-done:hover{background:color-mix(in srgb,var(--good) 16%,transparent)}
.fm-mag,.fm-current,.fm-magtoggle{display:none}
#focusMode.hastasks .fm-mag{display:block}
#focusMode.hastasks .fm-current{display:block}
#focusMode.paused .fm-timer{opacity:.4}
#focusMode.paused .fm-phase-label::after{content:' · paused';color:var(--dim)}
#focusMode.paused .fm-ring .prog{opacity:.35}

/* subtask strip (only when present) */
.subt-strip{display:flex;gap:7px;overflow-x:auto;margin-top:9px;padding-bottom:3px}
.subt-strip::-webkit-scrollbar{height:4px}
.subt-strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.subt{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;color:var(--dim);cursor:pointer;white-space:nowrap;transition:.15s}
.subt.done{background:color-mix(in srgb,var(--good) 18%,transparent);border-color:var(--good);color:var(--good);text-decoration:line-through}

/* slide-to-exit handle (mobile) */
.fm-exitedge{display:none}

/* modal / sheet */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:18px}
.scrim.show{display:flex;animation:fade .25s}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:20px;width:100%;max-width:440px;padding:24px;max-height:86vh;overflow-y:auto}
.modal h2{font-family:var(--serif);font-size:25px;font-weight:900;margin-bottom:4px}
.modal .mnote{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:18px;line-height:1.5}

/* session summary */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.sum-stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px}
.sum-stat .sv{font-family:var(--mono);font-size:24px;font-weight:800}
.sum-stat .sl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:3px}
.sum-stat.rating .sv{color:var(--accent)}
.mood-row{display:flex;gap:7px;margin:6px 0 16px}
.mood-row button{flex:1;aspect-ratio:1;border:1px solid var(--line);background:var(--panel2);border-radius:12px;font-size:22px;cursor:pointer;transition:.15s}
.mood-row button.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);transform:scale(1.06)}

/* empty states */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:60px 24px;min-height:50vh}
.empty .big{font-family:var(--serif);font-size:30px;font-weight:900;line-height:1.05}
.empty .sub{font-family:var(--mono);font-size:13px;color:var(--dim);max-width:280px;line-height:1.6}

.placeholder{font-family:var(--mono);font-size:13px;color:var(--faint);text-align:center;padding:50px 20px;line-height:1.7}
/* dashboard */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px}
.hero-tile .hv{font-family:var(--mono);font-size:23px;font-weight:800;letter-spacing:-.01em}
.hero-tile .hl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:4px}
.rangepick{display:flex;gap:4px}
.rangepick button{font-family:var(--mono);font-size:10px;padding:5px 10px;border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:7px;cursor:pointer;transition:.15s}
.rangepick button.on{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
/* calendar */
.cal-scroll{overflow:visible;padding-bottom:4px}
.cal-svg{display:block;width:100%;height:auto}
.cal-cell{cursor:pointer;transition:filter .12s}
.cal-cell:hover{filter:brightness(1.35)}
.cal-cell.sel{stroke:var(--accent);stroke-width:2}
.day-detail{margin-top:14px;min-height:18px;opacity:0;transition:opacity .2s;display:flex;flex-direction:column;gap:3px}
.day-detail.show{opacity:1}
.day-detail .dd-date{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.04em}
.day-detail .dd-stats{font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.5}
.day-detail .dd-stats b{color:var(--txt);font-weight:700}
.cal-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:12px;font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.cal-legend .lg-sq{width:11px;height:11px;border-radius:2.5px;border:0.5px solid var(--line)}
.rec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rec-grid .rv{font-family:var(--mono);font-size:18px;font-weight:800}
.rec-grid .rl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:3px}
/* charts */
.chart-svg{display:block;touch-action:none}
.chart-svg .ax-y{fill:var(--faint);font-family:var(--mono);font-size:7.5px;text-anchor:end}
.chart-svg .ax-x{fill:var(--faint);font-family:var(--mono);font-size:7.5px}
.chart-svg .ch-pt{cursor:pointer}
.ch-summary{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:10px;text-align:center}
.ch-empty{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;padding:16px}
.fact-box{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.fact-box .fact-big{font-family:var(--mono);font-size:30px;font-weight:800;color:var(--accent);letter-spacing:-.02em}
.fact-box .fact-rest{font-family:var(--sans);font-size:14px;color:var(--txt);line-height:1.4;flex:1;min-width:160px}
/* session timeline */
.sess-legend{display:flex;gap:16px;margin-bottom:14px}
.sess-legend span{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--dim)}
.sess-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.sess-row{margin-bottom:16px}
.sess-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sess-date{font-family:var(--mono);font-size:12px;color:var(--txt)}
.sess-rating{font-family:var(--mono);font-size:12px;font-weight:700}
.sess-bar{display:flex;height:18px;border-radius:6px;overflow:hidden;background:var(--panel2);gap:1px}
.sess-bar .seg{height:100%;min-width:1px;transition:opacity .2s}
.sess-bar .seg:hover{opacity:.75}
.sess-foot{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--faint)}
.sess-q{color:var(--accent);margin-left:6px}
.sess-manual-tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.sess-scroll{max-height:340px;overflow-y:auto;margin:0 -4px;padding:0 4px}
/* vibe color picker */
.vibe-row{display:flex;flex-wrap:wrap;gap:7px}
.vibe-sw{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:.15s;position:relative;padding:0}
.vibe-sw:hover{transform:scale(1.1)}
.vibe-sw.on{border-color:var(--txt);box-shadow:0 0 0 2px var(--bg) inset}
.vibe-sw.custom{display:flex;align-items:center;justify-content:center;overflow:hidden}
/* category management */
.cat-manage-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.cat-manage-row:last-child{border-bottom:none}
.cm-dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
.cm-name{flex:1;font-size:14px}
.cm-btn{background:none;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:7px;cursor:pointer;transition:.15s}
.cm-btn:hover{border-color:var(--accent);color:var(--accent)}
.cm-btn.del:hover{border-color:var(--bad);color:var(--bad)}
/* time field */
.timebtn{font-family:var(--mono);font-size:13px}
/* hex entry */
.hex-entry{display:none;align-items:center;gap:8px;margin-top:10px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.hex-entry.open{display:flex}
.hex-preview{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);flex:0 0 auto}
.hex-hash{font-family:var(--mono);color:var(--faint);font-size:14px}
.hex-entry input{flex:1;background:none;border:none;color:var(--txt);font-family:var(--mono);font-size:14px;letter-spacing:.08em;text-transform:lowercase}
.hex-entry input:focus{outline:none}
/* time picker */
.tp-preview{font-family:var(--mono);font-size:30px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:16px}
.tp-cols{display:flex;gap:12px}
.tp-col{flex:1}
.tp-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:8px}
.tp-scroll{height:160px;overflow-y:auto;border:1px solid var(--line);border-radius:11px;background:var(--bg);padding:4px}
.tp-opt{display:block;width:100%;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:15px;padding:9px 0;cursor:pointer;border-radius:7px;transition:.12s}
.tp-opt:hover{background:var(--panel2);color:var(--txt)}
.scrim2{z-index:340}
.due-time-head{display:flex;justify-content:space-between;align-items:baseline;margin:18px 0 10px;padding-top:16px;border-top:1px solid var(--line)}
.due-time-val{font-family:var(--mono);font-size:12px;color:var(--accent)}
.tp-opt.on{background:var(--accent);color:#0c0d10;font-weight:700}
/* tabs */
.tabs{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:18px}
.tabs button{flex:1;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:12px;padding:10px;border-radius:9px;cursor:pointer;transition:.15s}
.tabs button.on{background:var(--accent);color:#0c0d10;font-weight:700}
/* goal groups & semester plans */
.goal-group{margin-bottom:22px}
.goal-group-head{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.goal-desc{font-size:13px;color:var(--dim);line-height:1.5;margin-top:4px}
.sem-plans{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px}
.sem-plan{display:flex;align-items:center;gap:9px}
.sem-plan .sp-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
.sem-plan .sp-title{flex:1;font-size:13px}
.sem-plan .sp-when{font-family:var(--mono);font-size:10px;color:var(--faint)}
.sem-plan-add{margin-top:12px;width:100%;background:none;border:1px dashed var(--line);color:var(--faint);font-family:var(--mono);font-size:11px;padding:9px;border-radius:9px;cursor:pointer;transition:.15s}
.sem-plan-add:hover{border-color:var(--accent);color:var(--accent)}
/* review prompt */
.review-prompt{display:flex;align-items:center;justify-content:space-between;gap:14px;background:color-mix(in srgb,var(--accent) 12%,var(--panel));border:1px solid var(--accent);border-radius:16px;padding:16px 18px;margin-bottom:16px;cursor:pointer;animation:pulse-border 2s ease-in-out infinite}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 45%,transparent)}50%{box-shadow:0 0 0 6px transparent}}
.review-prompt .rp-title{font-family:var(--serif);font-size:17px;font-weight:600}
.review-prompt .rp-sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px}
/* review entry */
.rev-cat{padding:14px 0;border-bottom:1px solid var(--line)}
.rev-cat:last-of-type{border-bottom:none}
.rev-cat-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.rev-cat-name{font-size:15px;font-weight:600}
.rev-stars{display:flex;align-items:center;gap:8px}
.rev-star{background:none;border:none;font-size:20px;color:var(--line);cursor:pointer;transition:.12s;padding:0}
.rev-star.on{color:var(--accent)}
.rev-star:hover{transform:scale(1.15)}
.rev-score-num{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:6px}
.rev-note-toggle{background:none;border:none;color:var(--faint);font-family:var(--mono);font-size:10.5px;cursor:pointer;margin-top:8px;padding:0}
.rev-note-toggle:hover{color:var(--accent)}
.adv-section{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.adv-toggle{background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;width:100%}
.adv-toggle span{color:var(--accent)}
.weight-row{display:flex;align-items:center;gap:10px;padding:7px 0}
/* goals */
.goal-sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.goal-empty{font-family:var(--mono);font-size:12px;color:var(--faint);line-height:1.6;padding:6px 0 4px}
.goal-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.goal-card.done{border-color:color-mix(in srgb,var(--good) 45%,var(--line))}
.goal-main{display:flex;justify-content:space-between;align-items:center;gap:14px;cursor:pointer}
.goal-info{flex:1;min-width:0}
.goal-title{font-size:17px;font-weight:600;margin-bottom:3px}
.goal-meta{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.goal-target{font-family:var(--mono);font-size:13px;color:var(--txt);font-weight:700}
.goal-viz{flex:0 0 auto}
.goal-ring-txt{fill:var(--txt);font-family:var(--mono);font-size:15px;font-weight:800}
.goal-check{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:none;color:var(--good);font-size:22px;cursor:pointer;transition:.18s}
.goal-check.on{background:color-mix(in srgb,var(--good) 18%,transparent);border-color:var(--good)}
.pace{font-family:var(--mono);font-size:10.5px;margin-left:8px}
.pace.ahead,.pace.done{color:var(--good)}
.pace.behind{color:var(--bad)}
.pace.onpace{color:var(--accent)}
.goal-manual{display:flex;align-items:center;gap:14px;margin-top:14px;justify-content:center}
.goal-manual button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);color:var(--accent);font-size:22px;font-family:var(--mono);cursor:pointer;transition:.15s}
.goal-manual button:hover{border-color:var(--accent)}
.goal-manual span{font-family:var(--mono);font-size:17px;font-weight:700;min-width:70px;text-align:center}
.subgoals{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.subgoal{display:flex;align-items:center;gap:10px}
.sg-bar{position:relative;width:54px;height:5px;background:var(--line);border-radius:3px;overflow:hidden;flex:0 0 auto}
.sg-bar i{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.sg-title{flex:1;font-size:13.5px;color:var(--txt)}
.subgoal.done .sg-title{color:var(--dim);text-decoration:line-through}
.sg-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line);background:none;color:var(--good);font-size:13px;cursor:pointer;flex:0 0 auto;transition:.15s}
.sg-check.on{background:color-mix(in srgb,var(--good) 18%,transparent);border-color:var(--good)}
.sg-pct{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:34px;text-align:right}
/* segmented toggle */
.seg-toggle{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.seg-toggle button{flex:1;background:var(--bg);border:none;color:var(--dim);font-family:var(--mono);font-size:12px;padding:11px;cursor:pointer;transition:.15s}
.seg-toggle button.on{background:var(--accent);color:#0c0d10;font-weight:700}
.subedit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
/* confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:600;overflow:hidden}
.confetti i{position:absolute;top:-10px;width:9px;height:9px;border-radius:2px;animation:fall 2.2s cubic-bezier(.4,.6,.6,1) forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.2}}
.chart-tip{position:fixed;z-index:500;background:var(--panel2);border:1px solid var(--accent);color:var(--txt);font-family:var(--mono);font-size:11px;padding:8px 11px;border-radius:9px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 24px rgba(0,0,0,.5);line-height:1.5;white-space:nowrap}
.chart-tip b{color:var(--accent)}
@media (min-aspect-ratio:1/1){.hero-grid{grid-template-columns:repeat(4,1fr)}}
.task-complete{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);background:none;cursor:pointer;transition:.18s;position:relative}
.task-complete:hover{border-color:var(--good)}
.task-complete:hover::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--good);font-size:13px;font-weight:700}

/* ===== responsive: wider-than-square = laptop ===== */
@media (max-aspect-ratio:1/1){
  /* magazine becomes a horizontal scroll strip above the current task; no toggle button */
  #focusMode.hastasks .fm-mag{display:flex;gap:8px;overflow-x:auto;position:absolute;left:0;right:0;bottom:calc(118px + env(safe-area-inset-bottom));top:auto;width:auto;max-width:none;border-left:none;border-top:1px solid var(--line);padding:12px 16px;backdrop-filter:blur(6px)}
  #focusMode.hastasks .fm-mag h4{display:none}
  #focusMode.hastasks .fm-mag #fmMagList{display:flex;gap:8px}
  .fm-mag .mag-task{flex:0 0 150px;margin-bottom:0}
  .fm-current{right:16px;left:16px;width:auto;max-width:none;bottom:calc(18px + env(safe-area-inset-bottom))}
}
@media (min-aspect-ratio:1/1){
  .page{padding:30px 32px 50px}
}

<script>
/* ============================================================
   FOCUS — Focus Dashboard
   Storage: IndexedDB. Single-file. Focus page first.
   ============================================================ */

/* ---------- resilient storage: IndexedDB with in-memory fallback ----------
   The UI must render even if IndexedDB is unavailable, blocked (e.g. private
   browsing), or hangs on open (a known mobile-WebKit quirk that fires no event).
   If the DB can't open, we transparently fall back to an in-memory store so the
   app stays fully functional for the session; persistence simply switches off
   until the page is reloaded in a supported context. Every op also degrades to
   the in-memory mirror if an individual transaction errors. */
const STORES=['kv','sessions','tasks','categories','goals','reviews','reviewCats'];
const DB={_db:null,mem:false,_m:{}};
STORES.forEach(s=>DB._m[s]=new Map());

function dbOpen(){
  return new Promise((resolve)=>{
    let settled=false;
    const done=(useMem)=>{if(settled)return;settled=true;DB.mem=useMem;resolve();};
    let r;
    try{
      if(!('indexedDB' in window)||!window.indexedDB){done(true);return;}
      r=indexedDB.open('focus',2);
    }catch(e){done(true);return;}
    // hang guard: if neither success/error/upgrade fires, fall back to memory
    const t=setTimeout(()=>done(true),3000);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      STORES.forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});
    };
    r.onsuccess=e=>{
      clearTimeout(t);
      if(settled){try{e.target.result.close();}catch(_){}return;}
      DB._db=e.target.result;
      DB._db.onversionchange=()=>{try{DB._db.close();}catch(_){}};
      done(false);
    };
    r.onerror=()=>{clearTimeout(t);done(true);};
    r.onblocked=()=>{clearTimeout(t);done(true);};
  });
}
function dbAll(store){
  if(DB.mem||!DB._db)return Promise.resolve([...DB._m[store].values()]);
  return new Promise((res)=>{try{const t=DB._db.transaction(store).objectStore(store).getAll();
    t.onsuccess=()=>res(t.result||[]);t.onerror=()=>res([...DB._m[store].values()]);}
    catch(e){res([...DB._m[store].values()]);}});
}
function dbPut(store,obj){
  DB._m[store].set(obj.id,obj);                 // keep mirror in sync in both modes
  if(DB.mem||!DB._db)return Promise.resolve(obj);
  return new Promise((res)=>{try{const t=DB._db.transaction(store,'readwrite').objectStore(store).put(obj);
    t.onsuccess=()=>res(obj);t.onerror=()=>res(obj);}catch(e){res(obj);}});
}
function dbGet(store,id){
  if(DB.mem||!DB._db)return Promise.resolve(DB._m[store].get(id));
  return new Promise((res)=>{try{const t=DB._db.transaction(store).objectStore(store).get(id);
    t.onsuccess=()=>res(t.result);t.onerror=()=>res(DB._m[store].get(id));}catch(e){res(DB._m[store].get(id));}});
}
function dbDel(store,id){
  DB._m[store].delete(id);
  if(DB.mem||!DB._db)return Promise.resolve();
  return new Promise((res)=>{try{const t=DB._db.transaction(store,'readwrite').objectStore(store).delete(id);
    t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});
}
function dbClear(store){
  DB._m[store].clear();
  if(DB.mem||!DB._db)return Promise.resolve();
  return new Promise((res)=>{try{const t=DB._db.transaction(store,'readwrite').objectStore(store).clear();
    t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});
}

/* kv helpers for settings/state */
async function kvGet(key,def){const r=await dbGet('kv',key);return r?r.value:def;}
async function kvSet(key,value){return dbPut('kv',{id:key,value});}

/* ---------- in-memory state ---------- */
let S={
  categories:[],
  tasks:[],
  settings:{
    focusMin:50, breakMin:10,         // default interval (hours+minutes flattened to minutes)
    sound:'chime', volume:0.7,
    focusColor:'#5b8fb0', breakColor:'#7fae8a',
    theme:'dark',
    weights:{adherence:0.5,ratio:0.3,consistency:0.2}, // session rating weights
  },
};
let uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ---------- THEME ---------- */
async function toggleTheme(){
  S.settings.theme = S.settings.theme==='dark'?'light':'dark';
  document.body.dataset.theme=S.settings.theme;
  await kvSet('settings',S.settings);
}

/* ---------- NAV ---------- */
let view='focus';
function go(v){
  view=v;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  const m=document.getElementById('main');
  if(v==='focus') renderFocusSetup(m);
  else if(v==='dashboard') renderDashboard(m);
  else if(v==='goals') renderGoals(m);
  else if(v==='tasks') renderTasks(m);
  else if(v==='review'){renderReview(m);updateReviewBadge();}
  else if(v==='settings') renderSettings(m);
}

/* ============================================================
   CATEGORIES
   ============================================================ */
async function addCategory(name,hex){
  const c={id:uid(),name:name.trim(),colorHex:hex||'#e0a458'};
  S.categories.push(c); await dbPut('categories',c); return c;
}
function catColor(id){const c=S.categories.find(x=>x.id===id);return c?c.colorHex:'var(--accent)';}
function catName(id){const c=S.categories.find(x=>x.id===id);return c?c.name:'';}

/* ============================================================
   TASKS
   ============================================================ */
async function saveTask(t){await dbPut('tasks',t);const i=S.tasks.findIndex(x=>x.id===t.id);if(i>=0)S.tasks[i]=t;else S.tasks.push(t);}
function newTaskObj(){return {id:uid(),name:'',questionCount:0,solved:0,category:null,due:null,dueTime:null,notes:'',subtasks:[],recurring:false,archived:false,createdAt:Date.now(),completedAt:null};}
function activeTasks(){return S.tasks.filter(t=>!t.archived);}

/* ============================================================
   FOCUS — setup screen
   ============================================================ */
function renderFocusSetup(m){
  const fh=Math.floor(S.settings.focusMin/60), fm=S.settings.focusMin%60;
  const bh=Math.floor(S.settings.breakMin/60), bm=S.settings.breakMin%60;
  m.innerHTML=`<div class="page">
    <h1 class="ptitle">Focus</h1>
    <div class="psub">Set your cadence, then lock in</div>

    <div class="card" style="margin-bottom:14px">
      <label class="lbl">Intervals</label>
      <div class="interval-set">
        <div>
          <div class="dur-input"><input id="fH" type="number" min="0" max="12" value="${fh}"><span>h</span><input id="fM" type="number" min="0" max="59" value="${fm}"><span>m focus</span></div>
        </div>
        <div>
          <div class="dur-input"><input id="bH" type="number" min="0" max="3" value="${bh}"><span>h</span><input id="bM" type="number" min="0" max="59" value="${bm}"><span>m break</span></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <label class="lbl">Pull tasks for this session (optional)</label>
      <div id="taskPick"></div>
      ${activeTasks().length===0?'<div style="font-family:var(--mono);font-size:11.5px;color:var(--faint);padding:6px 0">No tasks yet — add some on the Tasks page, or just run a clean session.</div>':''}
    </div>

    <button class="btn" onclick="startSession()">Begin focus →</button>
    <button class="btn ghost" style="margin-top:10px" onclick="openManualLog()">+ Log a past session</button>
  </div>`;
  renderTaskPick();
}
let setupSelTasks=new Set();
function renderTaskPick(){
  const el=document.getElementById('taskPick');if(!el)return;
  el.innerHTML = activeTasks().map(t=>{
    const on=setupSelTasks.has(t.id);
    const meta = t.questionCount>0?`${t.solved}/${t.questionCount} q`:'time-based';
    return `<div class="task-pick-row ${on?'on':''}" onclick="toggleSetupTask('${t.id}')">
      <div class="tcheck">${on?'✓':''}</div>
      <div class="tname">${esc(t.name)}</div>
      <div class="tmeta">${meta}</div>
    </div>`;
  }).join('');
}
function toggleSetupTask(id){setupSelTasks.has(id)?setupSelTasks.delete(id):setupSelTasks.add(id);renderTaskPick();}

/* ============================================================
   FOCUS SESSION ENGINE
   ============================================================ */
let SESS=null;          // active session state
let tick=null;          // interval handle
let audioCtx=null;

function startSession(){
  const fMin = (+document.getElementById('fH').value||0)*60 + (+document.getElementById('fM').value||0);
  const bMin = (+document.getElementById('bH').value||0)*60 + (+document.getElementById('bM').value||0);
  if(fMin<=0){toast('Set a focus length first');return;}
  S.settings.focusMin=fMin; S.settings.breakMin=bMin; kvSet('settings',S.settings);

  SESS={
    id:uid(), startedAt:Date.now(), endedAt:null,
    focusLen:fMin*60, breakLen:bMin*60,    // seconds
    phase:'focus', phaseStart:Date.now(), phaseElapsedBefore:0,
    intervals:[], pauses:[], paused:false, pauseStart:null,
    tasks:[...setupSelTasks].map(id=>{const t=S.tasks.find(x=>x.id===id);return {id,solvedThisSession:0};}),
    activeTaskId:[...setupSelTasks][0]||null,
    _poolSize:setupSelTasks.size, _poolDone:0,
  };
  // apply vibe colors
  document.documentElement.style.setProperty('--focus',S.settings.focusColor);
  document.documentElement.style.setProperty('--break',S.settings.breakColor);
  enterFocusMode();
}

function enterFocusMode(){
  const fm=document.getElementById('focusMode');
  fm.classList.add('show');
  fm.classList.remove('paused','dimmed');
  // reset pause button to clean "Pause" state every session
  document.getElementById('fmPause').innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>Pause';
  const hasTasks=SESS.tasks.length>0;
  fm.classList.toggle('hastasks',hasTasks);
  setPhaseClass();
  if(hasTasks){renderMag();renderCurrent();}
  startTick();
  scheduleDim();
  acquireWakeLock();
  document.addEventListener('keydown',focusKeys);
}
let wakeLock=null;
async function acquireWakeLock(){
  try{ if('wakeLock' in navigator){ wakeLock=await navigator.wakeLock.request('screen'); } }catch(e){}
}
async function releaseWakeLock(){ try{ if(wakeLock){await wakeLock.release();wakeLock=null;} }catch(e){} }
// re-acquire if the page was hidden and returns (wake lock auto-drops on visibility loss)
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible' && SESS && !wakeLock) acquireWakeLock(); });
function setPhaseClass(){
  const fm=document.getElementById('focusMode');
  fm.classList.toggle('phase-focus',SESS.phase==='focus');
  fm.classList.toggle('phase-break',SESS.phase==='break');
  document.getElementById('fmPhase').textContent=SESS.phase==='focus'?'FOCUS':'BREAK';
  const flip=document.getElementById('fmFlip');
  flip.textContent=SESS.phase==='focus'?'Take a break':'Back to focus';
}

let dimTimer=null;
function scheduleDim(){clearTimeout(dimTimer);document.getElementById('focusMode').classList.remove('dimmed');dimTimer=setTimeout(()=>document.getElementById('focusMode').classList.add('dimmed'),20000);}
['mousemove','touchstart','keydown'].forEach(e=>document.addEventListener(e,()=>{if(SESS)scheduleDim();}));

function phaseElapsed(){
  if(!SESS)return 0;
  if(SESS.paused) return SESS.phaseElapsedBefore;
  return SESS.phaseElapsedBefore + (Date.now()-SESS.phaseStart)/1000;
}
// total wall-clock since session start, MINUS all paused time (and minus current pause if paused)
function totalElapsed(){
  if(!SESS)return 0;
  let paused=SESS.pauses.reduce((a,p)=>a+p.duration,0);
  if(SESS.paused) paused += (Date.now()-SESS.pauseStart)/1000;
  return Math.max(0,(Date.now()-SESS.startedAt)/1000 - paused);
}
function startTick(){clearInterval(tick);tick=setInterval(updateTimer,250);updateTimer();}
function updateTimer(){
  if(!SESS)return;
  const el=phaseElapsed();
  const target=SESS.phase==='focus'?SESS.focusLen:SESS.breakLen;
  const remain=Math.max(0,target-el);
  let display, over=el>target;
  if(over){ display='+'+fmtClock(el-target); }
  else display=fmtClock(remain);
  document.getElementById('fmTimer').textContent=display;
  document.getElementById('fmTimer').style.color = over? 'var(--bad)' : '';
  const ring=document.getElementById('fmRing');
  const C=2*Math.PI*46;
  const frac=Math.min(1,el/target);
  ring.style.strokeDasharray=C;
  ring.style.strokeDashoffset=C*(1-frac);
  const net=netStudySeconds();
  document.getElementById('fmStats').innerHTML=`<b>${fmtClock(net)}</b> net · ${fmtClock(totalElapsed())} total`;
  if(over && !SESS._dinged){SESS._dinged=true; ding(SESS.phase==='focus'?'break':'focus');}
}
function netStudySeconds(){
  let s=SESS.intervals.filter(i=>i.type==='focus').reduce((a,i)=>a+i.actual,0);
  if(SESS.phase==='focus') s+=phaseElapsed();
  return s;
}

/* phase flip (manual trigger) */
function flipPhase(){
  if(!SESS||SESS.paused)return;       // can't flip while paused
  const target=SESS.phase==='focus'?SESS.focusLen:SESS.breakLen;
  const actual=phaseElapsed();
  SESS.intervals.push({type:SESS.phase,planned:target,actual});
  SESS.phase = SESS.phase==='focus'?'break':'focus';
  SESS.phaseStart=Date.now(); SESS.phaseElapsedBefore=0; SESS._dinged=false;
  setPhaseClass(); ding(SESS.phase);
  updateTimer();
}

/* pause — freezes phase timer AND total; logs the pause */
function togglePause(){
  if(!SESS)return;
  const btn=document.getElementById('fmPause');
  if(!SESS.paused){
    // freeze: bank the elapsed, stop the clock
    SESS.phaseElapsedBefore=phaseElapsed();
    SESS.paused=true; SESS.pauseStart=Date.now();
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>Resume';
    document.getElementById('focusMode').classList.add('paused');
  }else{
    // resume: log the pause duration, restart the phase clock from the banked elapsed
    SESS.pauses.push({start:SESS.pauseStart,duration:(Date.now()-SESS.pauseStart)/1000});
    SESS.pauseStart=null;
    SESS.paused=false;
    SESS.phaseStart=Date.now();     // phaseElapsedBefore already holds banked time
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>Pause';
    document.getElementById('focusMode').classList.remove('paused');
  }
}

/* exit */
function requestExit(){
  openModal(`<h2>End session early?</h2>
    <p class="mnote">You can save what you've done so far, or keep going.</p>
    <button class="btn" onclick="endSession()">End & save</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">Keep going</button>`);
}
function focusKeys(e){
  if(!SESS)return;
  if(e.key==='Escape'){e.preventDefault();requestExit();}
  else if(e.code==='Space'){e.preventDefault();solveQuestion(1);}
  else if(e.key==='Backspace'||e.key==='ArrowDown'){e.preventDefault();solveQuestion(-1);}
}

/* ---------- magazine + question tracking ---------- */
function renderMag(){
  const list=document.getElementById('fmMagList');
  if(!SESS.tasks.length){list.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.6">No tasks pulled.<br>Untagged focus session.</div>';return;}
  list.innerHTML=SESS.tasks.map(st=>{
    const t=S.tasks.find(x=>x.id===st.id);if(!t)return'';
    const pct=t.questionCount>0?Math.min(100,t.solved/t.questionCount*100):0;

async function solveQuestion(delta){
  const st=SESS.tasks.find(x=>x.id===SESS.activeTaskId);
  if(!st)return;
  const t=S.tasks.find(x=>x.id===st.id);
  if(!t||t.questionCount<=0)return;
  const before=t.solved;
  t.solved=Math.max(0,Math.min(t.questionCount,t.solved+delta));
  st.solvedThisSession=Math.max(0,st.solvedThisSession+delta);
  if(delta>0 && t.solved>before) sndQuestion();

}

/* ---------- session rating ---------- */
function rateIntervals(intervals, focusLen, breakLen, weights){
  // length-independent discipline rating 0..1
  const focs=intervals.filter(i=>i.type==='focus');
  const brks=intervals.filter(i=>i.type==='break');
  if(!focs.length) return 0;
  // 1) adherence: how close focus blocks were to planned focus length
  const adh = avg(focs.map(i=>{
    const r=i.actual/focusLen;            // 1 = perfect
    // both under and over hurt; symmetric-ish, gentle
    return clamp(1-Math.abs(r-1)*0.6,0,1);
  }));
  // 2) focus:break ratio — penalize over-long breaks (grace then penalty)
  const ratio = brks.length? avg(brks.map(i=>{
    const over=i.actual/breakLen;          // 1 = on plan
    if(over<=1.25) return 1;               // grace
    return clamp(1-(over-1.25)*0.7,0,1);   // then penalty
  })) : 1;
  // 3) consistency: low variance among focus block lengths
  const lens=focs.map(i=>i.actual);
  const cons = lens.length<2?1:clamp(1-(stdev(lens)/(mean(lens)||1))*0.9,0,1);
  const w=weights;
  return clamp(adh*w.adherence + ratio*w.ratio + cons*w.consistency, 0,1);
}
function finalizeSession(){
  // close current interval
  const target=SESS.phase==='focus'?SESS.focusLen:SESS.breakLen;
  SESS.intervals.push({type:SESS.phase,planned:target,actual:phaseElapsed()});
  SESS.endedAt=Date.now();
  const rating=rateIntervals(SESS.intervals,SESS.focusLen,SESS.breakLen,S.settings.weights);
  const net=SESS.intervals.filter(i=>i.type==='focus').reduce((a,i)=>a+i.actual,0);
  const totalPause=SESS.pauses.reduce((a,p)=>a+p.duration,0);
  const questions=SESS.tasks.reduce((a,t)=>a+t.solvedThisSession,0);
  return {
    id:SESS.id, startedAt:SESS.startedAt, endedAt:SESS.endedAt,
    dayKey:dayKeyOf(SESS.startedAt),
    focusLen:SESS.focusLen, breakLen:SESS.breakLen,
    intervals:SESS.intervals, pauses:SESS.pauses,
    tasks:SESS.tasks,
    netStudy:net, totalTime:(SESS.endedAt-SESS.startedAt)/1000, totalPause,
    rating, qualityAdjusted:net*rating, questions,
    mood:null, note:'',
  };
}

/* ---------- sound engine (Web Audio, layers over music) ---------- */
function actx(){audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();return audioCtx;}
// play a note: freq, start offset, duration, peak gain mult, waveform
function note(f,start,dur,gainMult,type){
  const ctx=actx(),t=ctx.currentTime+start;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||'sine';o.frequency.value=f;
  o.connect(g);g.connect(ctx.destination);
  const peak=S.settings.volume*(gainMult==null?1:gainMult);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(peak,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function ding(toPhase){
  try{
    const freqs = toPhase==='break'?[523,659,784]:[784,659,523];
    freqs.forEach((f,i)=>note(f,i*0.13,0.4,1,'sine'));
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate(toPhase==='break'?[80,40,80]:[120]);
}
// soft, woody tick when logging a question (+1) — understated so rapid presses don't grate
function sndQuestion(){try{note(420,0,0.06,0.3,'sine');}catch(e){}}
// gentle soft bell when completing a subtask
function sndSubtask(){try{note(660,0,0.18,0.4,'sine');note(990,0,0.14,0.16,'sine');}catch(e){}}
// warm major chord when completing a whole task (not in a pool)
function sndTaskDone(){try{[392,494,587].forEach(f=>note(f,0,0.55,0.4,'sine'));note(784,0.02,0.5,0.18,'sine');}catch(e){}
  if(navigator.vibrate)navigator.vibrate(60);}
// escalating pitch as you clear the session's task pool — step climbs each completion
function sndSessionProgress(step,total){
  try{
    // climb a pentatonic-ish scale; final task gets a triumphant extra
    const scale=[523,587,659,784,880,988,1175,1319,1568,1760];
    const idx=Math.min(scale.length-1, step-1);
    note(scale[idx],0,0.5,0.6,'triangle');
    note(scale[idx]*1.5,0.04,0.4,0.28,'sine');
    if(step>=total){ // finished everything you set out to do
      [0,0.12,0.24].forEach((d,i)=>note(scale[Math.min(scale.length-1,idx+1+i)],0.3+d,0.5,0.4,'triangle'));
      if(navigator.vibrate)navigator.vibrate([60,40,60,40,120]);
    }
  }catch(e){}
}

function aggregateDays(sessions){
  const days={};
  sessions.forEach(s=>{
    const k=s.dayKey||dayKeyOf(s.startedAt);
    (days[k]=days[k]||{sessions:[],net:0,questions:0,intervals:[],pauseCount:0,pauseTime:0,realNet:0}).sessions.push(s);
    days[k].net+=s.netStudy||0;
    if(!s.manual)days[k].realNet+=s.netStudy||0;   // time from genuine timed sessions
    days[k].questions+=s.questions||0;
    days[k].intervals.push(...(s.intervals||[]));    // manual sessions have none
    days[k].pauseCount+=(s.pauses||[]).length;
    days[k].pauseTime+=(s.totalPause||0);
  });
  const doneByDay={};
  S.tasks.filter(t=>t.completedAt).forEach(t=>{const k=dayKeyOf(t.completedAt);doneByDay[k]=(doneByDay[k]||0)+1;});
  const nets=Object.values(days).map(d=>d.net).filter(n=>n>0);
  const avgNet=nets.length?nets.reduce((a,b)=>a+b,0)/nets.length:1;
  Object.entries(days).forEach(([k,d])=>{
    // rating only from real intervals; pure-manual days have no rating
    d.hasReal=d.intervals.length>0;
    d.rating=d.hasReal?rateIntervals(d.intervals, S.settings.focusMin*60, S.settings.breakMin*60, S.settings.weights):null;
    d.tasksDone=doneByDay[k]||0;
    const dur=clamp(d.net/(avgNet*1.5),0,1);
    const tsk=clamp(d.tasksDone/4,0,1);
    // if no real rating (manual-only day), score on duration + tasks, reweighted
    d.score = d.hasReal
      ? clamp(d.rating*0.5 + dur*0.35 + tsk*0.15, 0,1)
      : clamp(dur*0.7 + tsk*0.3, 0,1);
  });
  return {days,avgNet,doneByDay};
}

function renderReviewCalendar(weekScores){

  const scores=Object.values(weekScores).map(d=>d.score).filter(s=>s>0);
  const lo=scores.length?Math.min(...scores):0,hi=scores.length?Math.max(...scores):1;
  const norm=s=>hi>lo?(s-lo)/(hi-lo):0.5;
  const VW=700,VH=110;
  const cols=Math.ceil(Math.sqrt(weeks*VW/VH));const rows=Math.ceil(weeks/cols);
  const unitW=VW/cols,unitH=VH/rows,unit=Math.min(unitW,unitH),gap=unit*0.16,cell=unit-gap;
  const gridW=cols*unitW,gridH=rows*unitH,offX=(VW-gridW)/2,offY=(VH-gridH)/2;
  let svg=`<svg viewBox="0 0 ${VW} ${VH}" class="cal-svg" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<weeks;i++){
    const ws=new Date(thisWeekStart);ws.setDate(thisWeekStart.getDate()-(weeks-1-i)*7);
    const wk=dayKeyOf(ws.getTime());
    const data=weekScores[wk];
    const col=i%cols,row=Math.floor(i/cols);
    const x=offX+col*unitW+(unitW-cell)/2,y=offY+row*unitH+(unitH-cell)/2;
    const fill=data?`color-mix(in srgb,var(--accent) ${Math.round(18+norm(data.score)*82)}%,var(--panel2))`:'var(--panel2)';
    const tip=data?`Week of ${fmtDateLabel(wk)}||${Math.round(data.rating*100)}% self-rating · ${Object.values(data.review.scores).filter(Boolean).length} categories`:`Week of ${fmtDateLabel(wk)}||no review`;
    svg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${cell.toFixed(1)}" height="${cell.toFixed(1)}" rx="${(cell*0.22).toFixed(1)}" fill="${fill}" stroke="var(--line)" stroke-width="0.5" class="cal-cell" data-k="${wk}" onclick="showReviewDetail('${wk}')" onmouseenter="showReviewDetail('${wk}',true)"/>`;

function reviewCatChart(c,reviews){
  // week-by-week score for this category (1..5 → 0..1)
  const sorted=[...reviews].sort((a,b)=>a.weekKey<b.weekKey?-1:1).slice(-16);

  const labels=sorted.map(r=>r.weekKey);
  if(sorted.filter(r=>r.scores[c.id]).length<1)return '';
  // build mini chart with custom rendering
  const W=320,H=96,padL=24,padB=16,padT=8;const plotW=W-padL-8,plotH=H-padT-padB;
  const xOf=i=>padL+(sorted.length<=1?plotW/2:i/(sorted.length-1)*plotW);
  const yOf=v=>padT+plotH-v*plotH;
  let grid='';[0,0.5,1].forEach(t=>{const y=yOf(t);grid+=`<line x1="${padL}" y1="${y}" x2="${W-8}" y2="${y}" stroke="var(--line)" stroke-width="0.5" opacity="0.5"/><text x="${padL-4}" y="${y+3}" class="ax-y">${Math.round(1+t*4)}</text>`;});
  const linePts=[];sorted.forEach((r,i)=>{if(r.scores[c.id])linePts.push([xOf(i),yOf(r.scores[c.id]/5),i]);});
  let path=linePts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  let dots=linePts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="${c.colorHex}"/>`).join('');

  const scored=sorted.filter(r=>r.scores[c.id]);
  const avgS=avg(scored.map(r=>r.scores[c.id]));

    <svg viewBox="0 0 ${W} ${H}" class="chart-svg" style="width:100%;height:auto">${grid}${linePts.length>1?`<path d="${path}" fill="none" stroke="${c.colorHex}" stroke-width="2" stroke-linejoin="round"/>`:''}${dots}${xlab}</svg>
  </div>`;

function renderCalendar(days){
  _calDays=days;
  const totalDays = dashRange==='sem'?140:(dashRange===52?364:84);  // 20w / 52w / 12w worth of days
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(today); start.setDate(start.getDate()-(totalDays-1));
  const scores=Object.values(days).map(d=>d.score).filter(s=>s>0);
  const lo=scores.length?Math.min(...scores):0, hi=scores.length?Math.max(...scores):1;
  const norm=s=>hi>lo?(s-lo)/(hi-lo):0.5;

  // FIXED box shape → constant rendered height. Pack `totalDays` cells into it as near-square tiles.
  const VW=700, VH=150, gapRatio=0.16;
  // choose columns so cells are roughly square within the box
  const cols=Math.max(1,Math.round(Math.sqrt(totalDays*VW/VH)));
  const rows=Math.ceil(totalDays/cols);
  const unitW=VW/cols, unitH=VH/rows;
  const unit=Math.min(unitW,unitH);
  const gap=unit*gapRatio, cell=unit-gap;
  // center the grid in the box
  const gridW=cols*unitW, gridH=rows*unitH;
  const offX=(VW-gridW)/2, offY=(VH-gridH)/2;

  // month tick positions (first day of each month that appears)
  const monthTicks=[];let lastMonth=-1;
  let svg=`<svg viewBox="0 0 ${VW} ${VH+18}" class="cal-svg" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<totalDays;i++){
    const date=new Date(start);date.setDate(start.getDate()+i);
    if(date>today)break;
    const col=i%cols, row=Math.floor(i/cols);
    const x=offX+col*unitW+(unitW-cell)/2, y=offY+row*unitH+(unitH-cell)/2;
    const k=dayKeyOf(date.getTime());
    const day=days[k];
    const fill=day&&day.net>0?`color-mix(in srgb,var(--accent) ${Math.round(18+norm(day.score)*82)}%, var(--panel2))`:'var(--panel2)';
    if(date.getMonth()!==lastMonth && col<cols-2){lastMonth=date.getMonth();monthTicks.push({x:offX+col*unitW,y:offY+row*unitH,label:date.toLocaleString('en',{month:'short'})});}
    svg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${cell.toFixed(1)}" height="${cell.toFixed(1)}" rx="${(cell*0.22).toFixed(1)}" fill="${fill}" stroke="var(--line)" stroke-width="0.5" class="cal-cell" data-k="${k}" onclick="showDayDetail('${k}')" onmouseenter="showDayDetail('${k}',true)"/>`;
  }
  svg+=`</svg>`;
  return svg;
}
function showDayDetail(k,hover){
  const day=_calDays&&_calDays[k];
  const el=document.getElementById('dayDetail');if(!el)return;
  document.querySelectorAll('.cal-cell').forEach(c=>c.classList.toggle('sel',c.getAttribute('data-k')===k && !hover));
  if(day&&day.net>0){
    const ratingBit = day.rating!=null?`<b>${Math.round(day.rating*100)}%</b> rating · `:`<span style="color:var(--faint)">manual log</span> · `;
    el.innerHTML=`<span class="dd-date">${fmtDateLabel(k)}</span>
      <span class="dd-stats"><b>${fmtClock(day.net)}</b> studied · ${ratingBit}<b>${day.questions||0}</b> q · <b>${day.tasksDone}</b> tasks · <b>${day.sessions.length}</b> session${day.sessions.length!==1?'s':''}</span>`;
  }else{
    el.innerHTML=`<span class="dd-date">${fmtDateLabel(k)}</span><span class="dd-stats" style="color:var(--faint)">no study logged</span>`;
  }
  el.classList.add('show');
}
function hideDayDetail(){const el=document.getElementById('dayDetail');if(el)el.classList.remove('show');}

/* ---------- generic interactive chart (axes + dates + hover) ---------- */
function chart(days,field,n,opts){
  opts=opts||{};
  const series=lastNDays(days,n).map((d,i)=>{
    const date=new Date();date.setHours(0,0,0,0);date.setDate(date.getDate()-(n-1-i));
    return {date,k:dayKeyOf(date.getTime()),v:d?(d[field]||0):0,has:!!(d&&d.net>0)};
  });
  const vals=series.map(s=>s.v);
  const dataMax=Math.max(...vals,opts.y1!=null?opts.y1:0);
  const y0=opts.y0!=null?opts.y0:0;
  const y1=opts.y1!=null?opts.y1:(dataMax*1.1||1);
  // layout in a fixed pixel viewBox so axes/text are crisp
  const W=320,H=120, padL=38,padB=18,padT=6,padR=4;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=i=>padL+ (series.length<=1?plotW/2: i/(series.length-1)*plotW);
  const yOf=v=>padT+plotH-((v-y0)/(y1-y0||1))*plotH;
  // y gridlines + labels (3 ticks)
  let grid='',ticks=3;
  for(let t=0;t<=ticks;t++){
    const val=y0+(y1-y0)*t/ticks; const y=yOf(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="0.5" opacity="0.5"/>`;
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" class="ax-y">${fmtAxis(val,opts.fmt)}</text>`;
  }
  // x date labels (first, mid, last)
  let xlab='';[0,Math.floor(series.length/2),series.length-1].forEach(i=>{
    const s=series[i];const d=s.date;
    xlab+=`<text x="${xOf(i).toFixed(1)}" y="${H-4}" class="ax-x" text-anchor="${i===0?'start':i===series.length-1?'end':'middle'}">${d.getMonth()+1}/${d.getDate()}</text>`;
  });
  let body='';
  if(opts.mode==='bar'){
    const bw=plotW/series.length*0.66;
    body=series.map((s,i)=>{
      const h=Math.max(s.v>0?1.5:0,(yOf(y0)-yOf(s.v)));
      const x=xOf(i)-bw/2;
      return `<rect x="${x.toFixed(1)}" y="${yOf(s.v).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1" fill="var(--accent)" opacity="${s.v>0?0.9:0.12}" class="ch-pt" data-i="${i}"/>`;
    }).join('');
  }else{
    const linePts=series.filter(s=>s.has);
    const path=linePts.map((s,i)=>{const gi=series.indexOf(s);return `${i?'L':'M'}${xOf(gi).toFixed(1)} ${yOf(s.v).toFixed(1)}`;}).join(' ');
    // area fill
    if(linePts.length>1){
      const first=series.indexOf(linePts[0]),last=series.indexOf(linePts[linePts.length-1]);
      body=`<path d="${path} L${xOf(last).toFixed(1)} ${yOf(y0).toFixed(1)} L${xOf(first).toFixed(1)} ${yOf(y0).toFixed(1)} Z" fill="var(--accent)" opacity="0.08"/>`
        +`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`;
    }
    body+=series.map((s,i)=>s.has?`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(s.v).toFixed(1)}" r="6" fill="transparent" class="ch-pt" data-i="${i}"/><circle cx="${xOf(i).toFixed(1)}" cy="${yOf(s.v).toFixed(1)}" r="2" fill="var(--accent)"/>`:'').join('');
  }
  // stash series for hover lookup
  const id='ch'+(_chartId++);
  _chartData[id]=series.map(s=>({k:fmtDateLabel(s.k),v:s.v,fmt:opts.fmt,has:s.has}));
  const avgV=avg(vals.filter((v,i)=>series[i].has));
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" data-cid="${id}" style="width:100%;height:auto"
      onmousemove="chartHover(event,this)" onmouseleave="hideChartTip()" onclick="chartHover(event,this)">
      ${grid}${body}${xlab}
      <line class="ch-cursor" x1="0" y1="${padT}" x2="0" y2="${padT+plotH}" stroke="var(--accent)" stroke-width="1" opacity="0" stroke-dasharray="2 2"/>
    </svg>
    <div class="ch-summary">avg ${fmtAxis(avgV,opts.fmt)} · peak ${fmtAxis(Math.max(...vals),opts.fmt)}</div>`;
}
let _chartId=0,_chartData={};
function fmtAxis(v,fmt){
  if(fmt==='clock'){const h=v/3600;return h>=1?h.toFixed(1)+'h':Math.round(v/60)+'m';}
  if(fmt==='pct')return Math.round(v*100)+'%';
  if(fmt==='mood')return (1+v*4).toFixed(1);   // 0..1 back to 1..5
  if(fmt==='int')return Math.round(v);
  return Math.round(v);
}
function chartHover(e,svg){
  const id=svg.getAttribute('data-cid');const data=_chartData[id];if(!data)return;
  const rect=svg.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width; // 0..1
  const padFrac=38/320, plotFrac=(320-38-4)/320;
  let i=Math.round((x-padFrac)/plotFrac*(data.length-1));
  i=Math.max(0,Math.min(data.length-1,i));
  const pt=data[i];
  const cursor=svg.querySelector('.ch-cursor');
  const cx=38+(i/(data.length-1))*(320-38-4);
  cursor.setAttribute('x1',cx);cursor.setAttribute('x2',cx);cursor.style.opacity='0.6';
  const tip=document.getElementById('chartTip');
  tip.innerHTML=`<b>${pt.k}</b><br>${pt.has?fmtAxis(pt.v,pt.fmt):'no study'}`;
  tip.style.opacity='1';
  let tx=e.clientX+12, ty=e.clientY-10;
  if(tx>window.innerWidth-120)tx=e.clientX-120;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}
function hideChartTip(){const t=document.getElementById('chartTip');if(t)t.style.opacity='0';document.querySelectorAll('.ch-cursor').forEach(c=>c.style.opacity='0');}

/* ---------- smart insight cards ---------- */
function bestTimeCard(sessions){
  // duration-weighted avg rating per start-hour (real timed sessions only)
  const buckets={};
  sessions.filter(s=>!s.manual&&s.rating!=null).forEach(s=>{const h=new Date(s.startedAt).getHours();(buckets[h]=buckets[h]||[]).push([s.rating||0,s.netStudy||0]);});
  const hours=Object.keys(buckets).map(Number);
  if(!hours.length)return '';
  let best={h:null,r:0};
  hours.forEach(h=>{
    const tot=buckets[h].reduce((a,x)=>a+x[1],0)||1;
    const wr=buckets[h].reduce((a,x)=>a+x[0]*x[1],0)/tot;
    if(wr>best.r)best={h,r:wr};
  });
  if(best.h==null)return '';
  const ampm=h=>{const x=h%12||12;return x+(h<12?'am':'pm');};
  return chartCard('Best time of day','when your sessions rate highest',
    `<div class="fact-box"><span class="fact-big">${ampm(best.h)}</span><span class="fact-rest">is your sharpest window — ${Math.round(best.r*100)}% avg rating on sessions started around then.</span></div>`);
}
function moodCard(sessions){
  // per-day mood = duration-weighted avg of that day's session moods; trend over days
  const byDay={};
  sessions.filter(s=>s.mood).forEach(s=>{
    const k=s.dayKey||dayKeyOf(s.startedAt);
    (byDay[k]=byDay[k]||[]).push([s.mood, s.netStudy||1]);
  });
  const keys=Object.keys(byDay);
  if(keys.length<2)return chartCard('Enjoyment trend','duration-weighted mood','<div class="ch-empty">Rate a few sessions to see whether you’re enjoying studying more over time.</div>');
  // build a days-like object holding the weighted mood (1..5 → 0..1 for the chart scale)
  const moodDays={};
  keys.forEach(k=>{
    const tot=byDay[k].reduce((a,x)=>a+x[1],0)||1;
    const wm=byDay[k].reduce((a,x)=>a+x[0]*x[1],0)/tot;   // 1..5
    moodDays[k]={net:1,mood01:(wm-1)/4, moodRaw:wm};       // net:1 marks the day as "has data"
  });
  const recent=avg(lastNDays(moodDays,14).filter(Boolean).map(d=>d.moodRaw));
  const prior=avg(lastNDays(moodDays,28).filter(Boolean).map(d=>d.moodRaw))||recent;
  const dir = recent>prior+0.15?'climbing':recent<prior-0.15?'dipping':'steady';
  return chartCard('Enjoyment trend','how studying feels · weighted by session length',
    chart(moodDays,'mood01',30,{mode:'line',fmt:'mood',y0:0,y1:1})
    + `<div class="ch-summary">${dir==='climbing'?'📈 you’re enjoying it more lately':dir==='dipping'?'📉 enjoyment has dipped recently':'➖ holding steady'} · ${recent.toFixed(1)}/5 last 2 weeks</div>`);
}
function comparisonCard(days){
  const thisWk=sumWindow(days,7), lastWk=sumWindow(days,14)-thisWk;
  const delta=lastWk?Math.round((thisWk/lastWk-1)*100):0;
  return chartCard('This week vs last','net study',
    `<div style="display:flex;align-items:baseline;gap:12px"><span style="font-family:var(--mono);font-size:26px;font-weight:800">${fmtClock(thisWk)}</span>
     <span style="font-family:var(--mono);font-size:13px;color:${delta>=0?'var(--good)':'var(--bad)'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}%</span></div>
     <div style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px">last week: ${fmtClock(lastWk)}</div>`);
}
function recordsCard(sessions){
  const longest=Math.max(0,...sessions.map(s=>s.netStudy||0));
  const bestRating=Math.max(0,...sessions.filter(s=>!s.manual&&s.rating!=null).map(s=>s.rating||0));
  const mostQ=Math.max(0,...sessions.map(s=>s.questions||0));
  return chartCard('Personal bests','records',
    `<div class="rec-grid">
      <div><div class="rv">${fmtClock(longest)}</div><div class="rl">longest</div></div>
      <div><div class="rv">${Math.round(bestRating*100)}%</div><div class="rl">best rating</div></div>
      <div><div class="rv">${mostQ}</div><div class="rl">most q's</div></div>
    </div>`);
}

/* ---------- session timeline (Garmin-sleep style) ---------- */
let _sessAll=[];
function sessionListCard(sessions){
  _sessAll=[...sessions].sort((a,b)=>b.startedAt-a.startedAt);
  const rows=_sessAll.map(sessionRow).join('');
  return `<div class="card chart-card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
      <label class="lbl" style="margin:0">Sessions</label>
      <span style="font-family:var(--mono);font-size:10px;color:var(--faint)">${_sessAll.length} total</span>
    </div>
    <div class="sess-legend"><span><i style="background:var(--focus)"></i>focus</span><span><i style="background:var(--break)"></i>break</span><span><i style="background:var(--faint)"></i>pause</span></div>
    <div class="sess-scroll">${rows||'<div class="ch-empty">No sessions yet.</div>'}</div>
  </div>`;
}
function sessionRow(s){
  const st=new Date(s.startedAt), et=new Date(s.endedAt||s.startedAt+(s.netStudy||0)*1000);
  const tfmt=d=>d.toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'});
  const dlabel=fmtDateLabel(s.dayKey||dayKeyOf(s.startedAt));
  const qbar = s.questions>0?`<span class="sess-q">✓ ${s.questions} q</span>`:'';
  if(s.manual){
    // manual log: solid muted bar, no rating, "logged" tag
    return `<div class="sess-row">
      <div class="sess-meta">
        <span class="sess-date">${dlabel} <span class="sess-manual-tag">manual</span></span>
        <span class="sess-rating" style="color:var(--faint)">—</span>
      </div>
      <div class="sess-bar"><div class="seg" style="width:100%;background:var(--dim);opacity:.4"></div></div>
      <div class="sess-foot">
        <span>logged session</span>
        <span>${fmtClock(s.netStudy||0)} ${qbar}</span>
      </div>
    </div>`;
  }
  let total=0;
  (s.intervals||[]).forEach(iv=>{total+=iv.actual;});
  const pauseTot=s.totalPause||0;
  const grand=total+pauseTot||1;
  let bar='';
  (s.intervals||[]).forEach(iv=>{
    const w=iv.actual/grand*100;
    const col=iv.type==='focus'?'var(--focus)':'var(--break)';
    bar+=`<div class="seg" style="width:${w}%;background:${col}"></div>`;
  });
  if(pauseTot>0)bar+=`<div class="seg" style="width:${pauseTot/grand*100}%;background:var(--faint);opacity:.5"></div>`;
  const moodEmoji=s.mood?['','😖','😕','😐','🙂','🔥'][s.mood]:'';
  return `<div class="sess-row">
    <div class="sess-meta">
      <span class="sess-date">${dlabel}</span>
      <span class="sess-rating" style="color:${s.rating>=0.8?'var(--good)':s.rating>=0.5?'var(--accent)':'var(--bad)'}">${Math.round((s.rating||0)*100)}%</span>
    </div>
    <div class="sess-bar">${bar}</div>
    <div class="sess-foot">
      <span>${tfmt(st)} → ${tfmt(et)}</span>
      <span>${fmtClock(s.netStudy||0)} net ${qbar} ${moodEmoji}</span>
    </div>
  </div>`;
}
function lastNDays(days,n){
  const out=[];const today=new Date();today.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);out.push(days[dayKeyOf(d.getTime())]||null);}
  return out;
}
function sumWindow(days,n){return lastNDays(days,n).reduce((a,d)=>a+(d?d.net:0),0);}
function computeStreak(days){
  let streak=0;const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<400;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const day=days[dayKeyOf(d.getTime())];
    if(day&&day.net>0)streak++;
    else if(i>0)break;
  }
  return streak;
}

/* ============================================================
   GOALS (priority #3)
   ============================================================ */
let S_goals=[];
async function loadGoals(){S_goals=await dbAll('goals');return S_goals;}
function weekKeyNow(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return dayKeyOf(d.getTime());}
function weekKeyOf(ts){const d=new Date(ts);d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return dayKeyOf(d.getTime());}

const METRICS={
  studyTime:{label:'Study time',unit:'time'},
  sessions:{label:'Sessions',unit:'count'},
  questions:{label:'Questions',unit:'count'},
  tasks:{label:'Tasks done',unit:'count'},
};

function newSemGoal(){return {id:uid(),tier:'semester',title:'',description:'',done:false,createdAt:Date.now()};}
// weekly goal: parentId (semester id | null=General), kind 'check'|'auto', recurrence 'once'|'weekly'|'daily', targetWeek (weekKey), date (optional iso)
function newWeeklyGoal(parentId){return {id:uid(),tier:'weekly',title:'',parentId:parentId||null,kind:'check',done:false,metric:'studyTime',target:18000,recurrence:'once',targetWeek:weekKeyNow(),date:null,createdAt:Date.now(),weekKey:weekKeyNow()};}

let goalTab='weekly';
function setGoalTab(t){goalTab=t;renderGoals(document.getElementById('main'));}

async function renderGoals(m){
  await loadGoals();
  const sessions=await loadSessions();
  // weekly auto-reset for recurring/once: a 'once' goal stays in its targetWeek; recurring rolls forward
  const wk=weekKeyNow();
  for(const g of S_goals){
    if(g.tier==='weekly'){
      if(g.recurrence==='once'){
        // resets its done state only within its own target week transitions handled by display
      }else{
        // recurring: if week advanced, reset done and move targetWeek to now
        if(g.weekKey!==wk){g.weekKey=wk;g.targetWeek=wk;g.done=false;await dbPut('goals',g);}
      }
    }
  }
  m.innerHTML=`<div class="page" style="max-width:760px">
    <h1 class="ptitle">Goals</h1><div class="psub">Weekly rhythm & the bigger picture</div>
    <div class="tabs">
      <button class="${goalTab==='weekly'?'on':''}" onclick="setGoalTab('weekly')">This week</button>
      <button class="${goalTab==='semester'?'on':''}" onclick="setGoalTab('semester')">Semester</button>
    </div>
    ${goalTab==='weekly'?renderWeeklyTab(sessions):renderSemesterTab()}
  </div>`;
}

function renderWeeklyTab(sessions){
  const wk=weekKeyNow();
  // weekly goals active this week: recurring always, or 'once' whose targetWeek === current week
  const active=S_goals.filter(g=>g.tier==='weekly' && (g.recurrence!=='once' || g.targetWeek===wk));
  const sems=S_goals.filter(g=>g.tier==='semester');
  let html='';
  // group: one section per semester goal that has weekly goals, then General
  sems.forEach(sem=>{
    const kids=active.filter(g=>g.parentId===sem.id);
    if(!kids.length)return;
    html+=`<div class="goal-group"><div class="goal-group-head">${esc(sem.title||'Semester goal')}</div>${kids.map(g=>weeklyGoalCard(g,sessions)).join('')}</div>`;
  });
  const general=active.filter(g=>!g.parentId||!sems.find(s=>s.id===g.parentId));
  html+=`<div class="goal-group"><div class="goal-group-head">General</div>${general.length?general.map(g=>weeklyGoalCard(g,sessions)).join(''):'<div class="goal-empty">No general weekly goals.</div>'}</div>`;
  html+=`<button class="btn ghost sm" style="margin-top:6px" onclick="editWeeklyGoal()">+ weekly goal</button>`;
  return html;
}

function renderSemesterTab(){
  const sems=S_goals.filter(g=>g.tier==='semester');
  let html = sems.length?sems.map(semGoalCard).join(''):'<div class="goal-empty">No semester goals yet. Set a big target, describe it, and plan the weekly goals that ladder up to it.</div>';
  html+=`<button class="btn ghost sm" style="margin-top:6px" onclick="editSemGoal()">+ semester goal</button>`;
  return html;
}

function semGoalCard(g){
  const plans=S_goals.filter(x=>x.tier==='weekly'&&x.parentId===g.id);
  const planList = plans.length?`<div class="sem-plans">${plans.map(p=>{
    const when = p.recurrence==='once'?(p.date?fmtDateLabel(p.date):'week of '+fmtDateLabel(p.targetWeek)):p.recurrence;
    return `<div class="sem-plan"><span class="sp-dot"></span><span class="sp-title">${esc(p.title)}</span><span class="sp-when">${when}</span></div>`;
  }).join('')}</div>`:'';
  return `<div class="goal-card ${g.done?'done':''}">
    <div class="goal-main">
      <button class="goal-check ${g.done?'on':''}" onclick="toggleSemDone('${g.id}')">${g.done?'✓':''}</button>
      <div class="goal-info" onclick="editSemGoal('${g.id}')" style="cursor:pointer">
        <div class="goal-title">${esc(g.title||'Semester goal')}</div>
        ${g.description?`<div class="goal-desc">${esc(g.description)}</div>`:''}
      </div>
    </div>
    ${planList}
    <button class="sem-plan-add" onclick="editWeeklyGoal(null,'${g.id}')">+ plan weekly goal</button>
  </div>`;
}

function weeklyGoalCard(g,sessions){
  if(g.kind==='auto'){
    const prog=goalProgress(g,sessions), raw=goalRawValue(g,sessions), done=prog>=1;
    return `<div class="goal-card ${done?'done':''}">
      <div class="goal-main" onclick="editWeeklyGoal('${g.id}')">
        <div class="goal-info">
          <div class="goal-title">${esc(g.title||METRICS[g.metric].label)}</div>
          <div class="goal-meta">auto · ${METRICS[g.metric].label}${g.recurrence!=='once'?' · '+g.recurrence:''}</div>
          <span class="goal-target">${fmtGoalVal(g,raw)} / ${fmtGoalVal(g,g.target)}</span> ${paceLabel(g,sessions)}
        </div>
        <div class="goal-viz">${ring(prog,52,done?'var(--good)':'var(--accent)')}</div>
      </div>
    </div>`;
  }
  // checkbox default
  return `<div class="goal-card ${g.done?'done':''}">
    <div class="goal-main">
      <button class="goal-check ${g.done?'on':''}" onclick="toggleWeeklyDone('${g.id}')">${g.done?'✓':''}</button>
      <div class="goal-info" onclick="editWeeklyGoal('${g.id}')" style="cursor:pointer">
