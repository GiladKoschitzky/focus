function renderCalendar(days){
  _calDays=days;
  const totalDays = dashRange==='sem'?140:(dashRange===52?364:84);  // 20w / 52w / 12w worth of days
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(today); start.setDate(start.getDate()-(totalDays-1));
  const scores=Object.values(days).map(d=>d.score).filter(s=>s>0);
  const lo=scores.length?Math.min(...scores):0, hi=scores.length?Math.max(...scores):1;
  const norm=s=>hi>lo?(s-lo)/(hi-lo):0.5;

  // FIXED box shape → constant rendered height. Pack `totalDays` cells into it as near-square tiles.
  const VW=700, VH=150, gapRatio=0.16;
  // choose columns so cells are roughly square within the box
  const cols=Math.max(1,Math.round(Math.sqrt(totalDays*VW/VH)));
  const rows=Math.ceil(totalDays/cols);
  const unitW=VW/cols, unitH=VH/rows;
  const unit=Math.min(unitW,unitH);
  const gap=unit*gapRatio, cell=unit-gap;
  // center the grid in the box
  const gridW=cols*unitW, gridH=rows*unitH;
  const offX=(VW-gridW)/2, offY=(VH-gridH)/2;

  // month tick positions (first day of each month that appears)
  const monthTicks=[];let lastMonth=-1;
  let svg=`<svg viewBox="0 0 ${VW} ${VH+18}" class="cal-svg" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<totalDays;i++){
    const date=new Date(start);date.setDate(start.getDate()+i);
    if(date>today)break;
    const col=i%cols, row=Math.floor(i/cols);
    const x=offX+col*unitW+(unitW-cell)/2, y=offY+row*unitH+(unitH-cell)/2;
    const k=dayKeyOf(date.getTime());
    const day=days[k];
    const fill=day&&day.net>0?`color-mix(in srgb,var(--accent) ${Math.round(18+norm(day.score)*82)}%, var(--panel2))`:'var(--panel2)';
    if(date.getMonth()!==lastMonth && col<cols-2){lastMonth=date.getMonth();monthTicks.push({x:offX+col*unitW,y:offY+row*unitH,label:date.toLocaleString('en',{month:'short'})});}
    svg+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${cell.toFixed(1)}" height="${cell.toFixed(1)}" rx="${(cell*0.22).toFixed(1)}" fill="${fill}" stroke="var(--line)" stroke-width="0.5" class="cal-cell" data-k="${k}" onclick="showDayDetail('${k}')" onmouseenter="showDayDetail('${k}',true)"/>`;
  }
  svg+=`</svg>`;
  return svg;
}
function showDayDetail(k,hover){
  const day=_calDays&&_calDays[k];
  const el=document.getElementById('dayDetail');if(!el)return;
  document.querySelectorAll('.cal-cell').forEach(c=>c.classList.toggle('sel',c.getAttribute('data-k')===k && !hover));
  if(day&&day.net>0){
    const ratingBit = day.rating!=null?`<b>${Math.round(day.rating*100)}%</b> rating · `:`<span style="color:var(--faint)">manual log</span> · `;
    el.innerHTML=`<span class="dd-date">${fmtDateLabel(k)}</span>
      <span class="dd-stats"><b>${fmtClock(day.net)}</b> studied · ${ratingBit}<b>${day.questions||0}</b> q · <b>${day.tasksDone}</b> tasks · <b>${day.sessions.length}</b> session${day.sessions.length!==1?'s':''}</span>`;
  }else{
    el.innerHTML=`<span class="dd-date">${fmtDateLabel(k)}</span><span class="dd-stats" style="color:var(--faint)">no study logged</span>`;
  }
  el.classList.add('show');
}
function hideDayDetail(){const el=document.getElementById('dayDetail');if(el)el.classList.remove('show');}

/* ---------- generic interactive chart (axes + dates + hover) ---------- */
function chart(days,field,n,opts){
  opts=opts||{};
  const series=lastNDays(days,n).map((d,i)=>{
    const date=new Date();date.setHours(0,0,0,0);date.setDate(date.getDate()-(n-1-i));
    return {date,k:dayKeyOf(date.getTime()),v:d?(d[field]||0):0,has:!!(d&&d.net>0)};
  });
  const vals=series.map(s=>s.v);
  const dataMax=Math.max(...vals,opts.y1!=null?opts.y1:0);
  const y0=opts.y0!=null?opts.y0:0;
  const y1=opts.y1!=null?opts.y1:(dataMax*1.1||1);
  // layout in a fixed pixel viewBox so axes/text are crisp
  const W=320,H=120, padL=38,padB=18,padT=6,padR=4;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=i=>padL+ (series.length<=1?plotW/2: i/(series.length-1)*plotW);
  const yOf=v=>padT+plotH-((v-y0)/(y1-y0||1))*plotH;
  // y gridlines + labels (3 ticks)
  let grid='',ticks=3;
  for(let t=0;t<=ticks;t++){
    const val=y0+(y1-y0)*t/ticks; const y=yOf(val);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="0.5" opacity="0.5"/>`;
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" class="ax-y">${fmtAxis(val,opts.fmt)}</text>`;
  }
  // x date labels (first, mid, last)
  let xlab='';[0,Math.floor(series.length/2),series.length-1].forEach(i=>{
    const s=series[i];const d=s.date;
    xlab+=`<text x="${xOf(i).toFixed(1)}" y="${H-4}" class="ax-x" text-anchor="${i===0?'start':i===series.length-1?'end':'middle'}">${d.getMonth()+1}/${d.getDate()}</text>`;
  });
  let body='';
  if(opts.mode==='bar'){
    const bw=plotW/series.length*0.66;
    body=series.map((s,i)=>{
      const h=Math.max(s.v>0?1.5:0,(yOf(y0)-yOf(s.v)));
      const x=xOf(i)-bw/2;
      return `<rect x="${x.toFixed(1)}" y="${yOf(s.v).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1" fill="var(--accent)" opacity="${s.v>0?0.9:0.12}" class="ch-pt" data-i="${i}"/>`;
    }).join('');
  }else{
    const linePts=series.filter(s=>s.has);
    const path=linePts.map((s,i)=>{const gi=series.indexOf(s);return `${i?'L':'M'}${xOf(gi).toFixed(1)} ${yOf(s.v).toFixed(1)}`;}).join(' ');
    // area fill
    if(linePts.length>1){
      const first=series.indexOf(linePts[0]),last=series.indexOf(linePts[linePts.length-1]);
      body=`<path d="${path} L${xOf(last).toFixed(1)} ${yOf(y0).toFixed(1)} L${xOf(first).toFixed(1)} ${yOf(y0).toFixed(1)} Z" fill="var(--accent)" opacity="0.08"/>`
        +`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`;
    }
    body+=series.map((s,i)=>s.has?`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(s.v).toFixed(1)}" r="6" fill="transparent" class="ch-pt" data-i="${i}"/><circle cx="${xOf(i).toFixed(1)}" cy="${yOf(s.v).toFixed(1)}" r="2" fill="var(--accent)"/>`:'').join('');
  }
  // stash series for hover lookup
  const id='ch'+(_chartId++);
  _chartData[id]=series.map(s=>({k:fmtDateLabel(s.k),v:s.v,fmt:opts.fmt,has:s.has}));
  const avgV=avg(vals.filter((v,i)=>series[i].has));
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" data-cid="${id}" style="width:100%;height:auto"
      onmousemove="chartHover(event,this)" onmouseleave="hideChartTip()" onclick="chartHover(event,this)">
      ${grid}${body}${xlab}
      <line class="ch-cursor" x1="0" y1="${padT}" x2="0" y2="${padT+plotH}" stroke="var(--accent)" stroke-width="1" opacity="0" stroke-dasharray="2 2"/>
    </svg>
    <div class="ch-summary">avg ${fmtAxis(avgV,opts.fmt)} · peak ${fmtAxis(Math.max(...vals),opts.fmt)}</div>`;
}
let _chartId=0,_chartData={};
function fmtAxis(v,fmt){
  if(fmt==='clock'){const h=v/3600;return h>=1?h.toFixed(1)+'h':Math.round(v/60)+'m';}
  if(fmt==='pct')return Math.round(v*100)+'%';
  if(fmt==='mood')return (1+v*4).toFixed(1);   // 0..1 back to 1..5
  if(fmt==='int')return Math.round(v);
  return Math.round(v);
}
function chartHover(e,svg){
  const id=svg.getAttribute('data-cid');const data=_chartData[id];if(!data)return;
  const rect=svg.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width; // 0..1
  const padFrac=38/320, plotFrac=(320-38-4)/320;
  let i=Math.round((x-padFrac)/plotFrac*(data.length-1));
  i=Math.max(0,Math.min(data.length-1,i));
  const pt=data[i];
  const cursor=svg.querySelector('.ch-cursor');
  const cx=38+(i/(data.length-1))*(320-38-4);
  cursor.setAttribute('x1',cx);cursor.setAttribute('x2',cx);cursor.style.opacity='0.6';
  const tip=document.getElementById('chartTip');
  tip.innerHTML=`<b>${pt.k}</b><br>${pt.has?fmtAxis(pt.v,pt.fmt):'no study'}`;
  tip.style.opacity='1';
  let tx=e.clientX+12, ty=e.clientY-10;
  if(tx>window.innerWidth-120)tx=e.clientX-120;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}
function hideChartTip(){const t=document.getElementById('chartTip');if(t)t.style.opacity='0';document.querySelectorAll('.ch-cursor').forEach(c=>c.style.opacity='0');}

/* ---------- smart insight cards ---------- */
function bestTimeCard(sessions){
  // duration-weighted avg rating per start-hour (real timed sessions only)
  const buckets={};
  sessions.filter(s=>!s.manual&&s.rating!=null).forEach(s=>{const h=new Date(s.startedAt).getHours();(buckets[h]=buckets[h]||[]).push([s.rating||0,s.netStudy||0]);});
  const hours=Object.keys(buckets).map(Number);
  if(!hours.length)return '';
  let best={h:null,r:0};
  hours.forEach(h=>{
    const tot=buckets[h].reduce((a,x)=>a+x[1],0)||1;
    const wr=buckets[h].reduce((a,x)=>a+x[0]*x[1],0)/tot;
    if(wr>best.r)best={h,r:wr};
  });
  if(best.h==null)return '';
  const ampm=h=>{const x=h%12||12;return x+(h<12?'am':'pm');};
  return chartCard('Best time of day','when your sessions rate highest',
    `<div class="fact-box"><span class="fact-big">${ampm(best.h)}</span><span class="fact-rest">is your sharpest window — ${Math.round(best.r*100)}% avg rating on sessions started around then.</span></div>`);
}
function moodCard(sessions){
  // per-day mood = duration-weighted avg of that day's session moods; trend over days
  const byDay={};
  sessions.filter(s=>s.mood).forEach(s=>{
    const k=s.dayKey||dayKeyOf(s.startedAt);
    (byDay[k]=byDay[k]||[]).push([s.mood, s.netStudy||1]);
  });
  const keys=Object.keys(byDay);
  if(keys.length<2)return chartCard('Enjoyment trend','duration-weighted mood','<div class="ch-empty">Rate a few sessions to see whether you’re enjoying studying more over time.</div>');
  // build a days-like object holding the weighted mood (1..5 → 0..1 for the chart scale)
  const moodDays={};
  keys.forEach(k=>{
    const tot=byDay[k].reduce((a,x)=>a+x[1],0)||1;
    const wm=byDay[k].reduce((a,x)=>a+x[0]*x[1],0)/tot;   // 1..5
    moodDays[k]={net:1,mood01:(wm-1)/4, moodRaw:wm};       // net:1 marks the day as "has data"
  });
  const recent=avg(lastNDays(moodDays,14).filter(Boolean).map(d=>d.moodRaw));
  const prior=avg(lastNDays(moodDays,28).filter(Boolean).map(d=>d.moodRaw))||recent;
  const dir = recent>prior+0.15?'climbing':recent<prior-0.15?'dipping':'steady';
  return chartCard('Enjoyment trend','how studying feels · weighted by session length',
    chart(moodDays,'mood01',30,{mode:'line',fmt:'mood',y0:0,y1:1})
    + `<div class="ch-summary">${dir==='climbing'?'📈 you’re enjoying it more lately':dir==='dipping'?'📉 enjoyment has dipped recently':'➖ holding steady'} · ${recent.toFixed(1)}/5 last 2 weeks</div>`);
}
function comparisonCard(days){
  const thisWk=sumWindow(days,7), lastWk=sumWindow(days,14)-thisWk;
  const delta=lastWk?Math.round((thisWk/lastWk-1)*100):0;
  return chartCard('This week vs last','net study',
    `<div style="display:flex;align-items:baseline;gap:12px"><span style="font-family:var(--mono);font-size:26px;font-weight:800">${fmtClock(thisWk)}</span>
     <span style="font-family:var(--mono);font-size:13px;color:${delta>=0?'var(--good)':'var(--bad)'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}%</span></div>
     <div style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px">last week: ${fmtClock(lastWk)}</div>`);
}
function recordsCard(sessions){
  const longest=Math.max(0,...sessions.map(s=>s.netStudy||0));
  const bestRating=Math.max(0,...sessions.filter(s=>!s.manual&&s.rating!=null).map(s=>s.rating||0));
  const mostQ=Math.max(0,...sessions.map(s=>s.questions||0));
  return chartCard('Personal bests','records',
    `<div class="rec-grid">
      <div><div class="rv">${fmtClock(longest)}</div><div class="rl">longest</div></div>
      <div><div class="rv">${Math.round(bestRating*100)}%</div><div class="rl">best rating</div></div>
      <div><div class="rv">${mostQ}</div><div class="rl">most q's</div></div>
    </div>`);
}

/* ---------- session timeline (Garmin-sleep style) ---------- */
let _sessAll=[];
function sessionListCard(sessions){
  _sessAll=[...sessions].sort((a,b)=>b.startedAt-a.startedAt);
  const rows=_sessAll.map(sessionRow).join('');
  return `<div class="card chart-card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px">
      <label class="lbl" style="margin:0">Sessions</label>
      <span style="font-family:var(--mono);font-size:10px;color:var(--faint)">${_sessAll.length} total</span>
    </div>
    <div class="sess-legend"><span><i style="background:var(--focus)"></i>focus</span><span><i style="background:var(--break)"></i>break</span><span><i style="background:var(--faint)"></i>pause</span></div>
    <div class="sess-scroll">${rows||'<div class="ch-empty">No sessions yet.</div>'}</div>
  </div>`;
}
function sessionRow(s){
  const st=new Date(s.startedAt), et=new Date(s.endedAt||s.startedAt+(s.netStudy||0)*1000);
  const tfmt=d=>d.toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'});
  const dlabel=fmtDateLabel(s.dayKey||dayKeyOf(s.startedAt));
  const qbar = s.questions>0?`<span class="sess-q">✓ ${s.questions} q</span>`:'';
  if(s.manual){
    // manual log: solid muted bar, no rating, "logged" tag
    return `<div class="sess-row">
      <div class="sess-meta">
        <span class="sess-date">${dlabel} <span class="sess-manual-tag">manual</span></span>
        <span class="sess-rating" style="color:var(--faint)">—</span>
      </div>
      <div class="sess-bar"><div class="seg" style="width:100%;background:var(--dim);opacity:.4"></div></div>
      <div class="sess-foot">
        <span>logged session</span>
        <span>${fmtClock(s.netStudy||0)} ${qbar}</span>
      </div>
    </div>`;
  }
  let total=0;
  (s.intervals||[]).forEach(iv=>{total+=iv.actual;});
  const pauseTot=s.totalPause||0;
  const grand=total+pauseTot||1;
  let bar='';
  (s.intervals||[]).forEach(iv=>{
    const w=iv.actual/grand*100;
    const col=iv.type==='focus'?'var(--focus)':'var(--break)';
    bar+=`<div class="seg" style="width:${w}%;background:${col}"></div>`;
  });
  if(pauseTot>0)bar+=`<div class="seg" style="width:${pauseTot/grand*100}%;background:var(--faint);opacity:.5"></div>`;
  const moodEmoji=s.mood?['','😖','😕','😐','🙂','🔥'][s.mood]:'';
  return `<div class="sess-row">
    <div class="sess-meta">
      <span class="sess-date">${dlabel}</span>
      <span class="sess-rating" style="color:${s.rating>=0.8?'var(--good)':s.rating>=0.5?'var(--accent)':'var(--bad)'}">${Math.round((s.rating||0)*100)}%</span>
    </div>
    <div class="sess-bar">${bar}</div>
    <div class="sess-foot">
      <span>${tfmt(st)} → ${tfmt(et)}</span>
      <span>${fmtClock(s.netStudy||0)} net ${qbar} ${moodEmoji}</span>
    </div>
  </div>`;
}
function lastNDays(days,n){
  const out=[];const today=new Date();today.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);out.push(days[dayKeyOf(d.getTime())]||null);}
  return out;
}
function sumWindow(days,n){return lastNDays(days,n).reduce((a,d)=>a+(d?d.net:0),0);}
function computeStreak(days){
  let streak=0;const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<400;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const day=days[dayKeyOf(d.getTime())];
    if(day&&day.net>0)streak++;
    else if(i>0)break;
  }
  return streak;
}

/* ============================================================
   GOALS (priority #3)
   ============================================================ */
let S_goals=[];
async function loadGoals(){S_goals=await dbAll('goals');return S_goals;}
function weekKeyNow(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return dayKeyOf(d.getTime());}
function weekKeyOf(ts){const d=new Date(ts);d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return dayKeyOf(d.getTime());}

const METRICS={
  studyTime:{label:'Study time',unit:'time'},
  sessions:{label:'Sessions',unit:'count'},
  questions:{label:'Questions',unit:'count'},
  tasks:{label:'Tasks done',unit:'count'},
};

function newSemGoal(){return {id:uid(),tier:'semester',title:'',description:'',done:false,createdAt:Date.now()};}
// weekly goal: parentId (semester id | null=General), kind 'check'|'auto', recurrence 'once'|'weekly'|'daily', targetWeek (weekKey), date (optional iso)
function newWeeklyGoal(parentId){return {id:uid(),tier:'weekly',title:'',parentId:parentId||null,kind:'check',done:false,metric:'studyTime',target:18000,recurrence:'once',targetWeek:weekKeyNow(),date:null,createdAt:Date.now(),weekKey:weekKeyNow()};}

let goalTab='weekly';
function setGoalTab(t){goalTab=t;renderGoals(document.getElementById('main'));}

async function renderGoals(m){
  await loadGoals();
  const sessions=await loadSessions();
  // weekly auto-reset for recurring/once: a 'once' goal stays in its targetWeek; recurring rolls forward
  const wk=weekKeyNow();
  for(const g of S_goals){
    if(g.tier==='weekly'){
      if(g.recurrence==='once'){
        // resets its done state only within its own target week transitions handled by display
      }else{
        // recurring: if week advanced, reset done and move targetWeek to now
        if(g.weekKey!==wk){g.weekKey=wk;g.targetWeek=wk;g.done=false;await dbPut('goals',g);}
      }
    }
  }
  m.innerHTML=`<div class="page" style="max-width:760px">
    <h1 class="ptitle">Goals</h1><div class="psub">Weekly rhythm & the bigger picture</div>
    <div class="tabs">
      <button class="${goalTab==='weekly'?'on':''}" onclick="setGoalTab('weekly')">This week</button>
      <button class="${goalTab==='semester'?'on':''}" onclick="setGoalTab('semester')">Semester</button>
    </div>
    ${goalTab==='weekly'?renderWeeklyTab(sessions):renderSemesterTab()}
  </div>`;
}

function renderWeeklyTab(sessions){
  const wk=weekKeyNow();
  // weekly goals active this week: recurring always, or 'once' whose targetWeek === current week
  const active=S_goals.filter(g=>g.tier==='weekly' && (g.recurrence!=='once' || g.targetWeek===wk));
  const sems=S_goals.filter(g=>g.tier==='semester');
  let html='';
  // group: one section per semester goal that has weekly goals, then General
  sems.forEach(sem=>{
    const kids=active.filter(g=>g.parentId===sem.id);
    if(!kids.length)return;
    html+=`<div class="goal-group"><div class="goal-group-head">${esc(sem.title||'Semester goal')}</div>${kids.map(g=>weeklyGoalCard(g,sessions)).join('')}</div>`;
  });
  const general=active.filter(g=>!g.parentId||!sems.find(s=>s.id===g.parentId));
  html+=`<div class="goal-group"><div class="goal-group-head">General</div>${general.length?general.map(g=>weeklyGoalCard(g,sessions)).join(''):'<div class="goal-empty">No general weekly goals.</div>'}</div>`;
  html+=`<button class="btn ghost sm" style="margin-top:6px" onclick="editWeeklyGoal()">+ weekly goal</button>`;
  return html;
}

function renderSemesterTab(){
  const sems=S_goals.filter(g=>g.tier==='semester');
  let html = sems.length?sems.map(semGoalCard).join(''):'<div class="goal-empty">No semester goals yet. Set a big target, describe it, and plan the weekly goals that ladder up to it.</div>';
  html+=`<button class="btn ghost sm" style="margin-top:6px" onclick="editSemGoal()">+ semester goal</button>`;
  return html;
}

function semGoalCard(g){
  const plans=S_goals.filter(x=>x.tier==='weekly'&&x.parentId===g.id);
  const planList = plans.length?`<div class="sem-plans">${plans.map(p=>{
    const when = p.recurrence==='once'?(p.date?fmtDateLabel(p.date):'week of '+fmtDateLabel(p.targetWeek)):p.recurrence;
    return `<div class="sem-plan"><span class="sp-dot"></span><span class="sp-title">${esc(p.title)}</span><span class="sp-when">${when}</span></div>`;
  }).join('')}</div>`:'';
  return `<div class="goal-card ${g.done?'done':''}">
    <div class="goal-main">
      <button class="goal-check ${g.done?'on':''}" onclick="toggleSemDone('${g.id}')">${g.done?'✓':''}</button>
      <div class="goal-info" onclick="editSemGoal('${g.id}')" style="cursor:pointer">
        <div class="goal-title">${esc(g.title||'Semester goal')}</div>
        ${g.description?`<div class="goal-desc">${esc(g.description)}</div>`:''}
      </div>
    </div>
    ${planList}
    <button class="sem-plan-add" onclick="editWeeklyGoal(null,'${g.id}')">+ plan weekly goal</button>
  </div>`;
}

function weeklyGoalCard(g,sessions){
  if(g.kind==='auto'){
    const prog=goalProgress(g,sessions), raw=goalRawValue(g,sessions), done=prog>=1;
    return `<div class="goal-card ${done?'done':''}">
      <div class="goal-main" onclick="editWeeklyGoal('${g.id}')">
        <div class="goal-info">
          <div class="goal-title">${esc(g.title||METRICS[g.metric].label)}</div>
          <div class="goal-meta">auto · ${METRICS[g.metric].label}${g.recurrence!=='once'?' · '+g.recurrence:''}</div>
          <span class="goal-target">${fmtGoalVal(g,raw)} / ${fmtGoalVal(g,g.target)}</span> ${paceLabel(g,sessions)}
        </div>
        <div class="goal-viz">${ring(prog,52,done?'var(--good)':'var(--accent)')}</div>
      </div>
    </div>`;
  }
  // checkbox default
  return `<div class="goal-card ${g.done?'done':''}">
    <div class="goal-main">
      <button class="goal-check ${g.done?'on':''}" onclick="toggleWeeklyDone('${g.id}')">${g.done?'✓':''}</button>
      <div class="goal-info" onclick="editWeeklyGoal('${g.id}')" style="cursor:pointer">
        <div class="goal-title">${esc(g.title||'Weekly goal')}</div>
        <div class="goal-meta">${g.recurrence==='once'?(g.date?'due '+fmtDateLabel(g.date):'this week'):g.recurrence}</div>
      </div>
    </div>
  </div>`;
}

// ---- auto progress (same as before) ----
function goalWindowStart(g){
  if(g.tier==='weekly'){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d.getTime();}
  return g.createdAt;
}
function goalRawValue(g,sessions){
  const ws=goalWindowStart(g);
  const inWin=sessions.filter(s=>s.startedAt>=ws);
  if(g.metric==='studyTime')return inWin.reduce((a,s)=>a+(s.netStudy||0),0);
  if(g.metric==='sessions')return inWin.length;
  if(g.metric==='questions')return inWin.reduce((a,s)=>a+(s.questions||0),0);
  if(g.metric==='tasks')return S.tasks.filter(t=>t.completedAt&&t.completedAt>=ws).length;
  return 0;
}
function goalProgress(g,sessions){return g.target>0?goalRawValue(g,sessions)/g.target:0;}
function fmtGoalVal(g,v){if(g.metric==='studyTime')return fmtClock(v);return Math.round(v);}
function ring(pct,size,color){
  const r=size/2-4,C=2*Math.PI*r,off=C*(1-Math.min(1,pct));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="goal-ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color||'var(--accent)'}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2+4}" text-anchor="middle" class="goal-ring-txt">${Math.round(pct*100)}%</text>
  </svg>`;
}
function paceLabel(g,sessions){
  if(g.kind!=='auto')return '';
  const now=new Date();const frac=(now.getDay()+now.getHours()/24)/7;
  const prog=goalProgress(g,sessions);
  if(prog>=1)return `<span class="pace done">✓ hit</span>`;
  if(frac<=0.02)return '';
  const ratio=prog/frac;
  if(ratio>=1.05)return `<span class="pace ahead">▲ ahead</span>`;
  if(ratio<=0.85)return `<span class="pace behind">▼ behind</span>`;
  return `<span class="pace onpace">● on pace</span>`;
}

let _revDraft=null, _revAdvanced=false;
function openReviewEntry(){
  if(!S_reviewCats.length){toast('Add review categories first');return;}
  const wk=weekKeyNow();
  const existing=S_reviews.find(r=>r.weekKey===wk);
  _revDraft = existing? JSON.parse(JSON.stringify(existing)) : {id:uid(),weekKey:wk,createdAt:Date.now(),scores:{},notes:{},weights:{}};
  _revAdvanced=false;
  renderReviewEntry();
}
function renderReviewEntry(){
  const cats=S_reviewCats;
  const rows=cats.map(c=>{
    const score=_revDraft.scores[c.id]||0;
    const note=_revDraft.notes[c.id]||'';
    const stars=[1,2,3,4,5].map(n=>`<button type="button" class="rev-star ${n<=score?'on':''}" onclick="setRevScore('${c.id}',${n})">●</button>`).join('');
    return `<div class="rev-cat">
      <div class="rev-cat-head"><span class="cm-dot" style="background:${c.colorHex}"></span><span class="rev-cat-name">${esc(c.name)}</span></div>

      <textarea class="fld rev-note" id="revnote_${c.id}" rows="2" style="display:${note?'block':'none'};margin-top:8px;resize:none" placeholder="reflections on ${esc(c.name)}…" oninput="_revDraft.notes['${c.id}']=this.value">${esc(note)}</textarea>
    </div>`;
  }).join('');
  // advanced weights
  const weightRows=cats.map(c=>{
    const w=_revDraft.weights[c.id]!=null?_revDraft.weights[c.id]:1;
    return `<div class="weight-row"><span class="cm-dot" style="background:${c.colorHex}"></span><span style="flex:1;font-size:13px">${esc(c.name)}</span>
      <input type="range" min="0" max="3" step="0.5" value="${w}" oninput="_revDraft.weights['${c.id}']=+this.value;document.getElementById('wv_${c.id}').textContent=(+this.value).toFixed(1)+'×'" style="width:120px">
      <span class="wv" id="wv_${c.id}" style="font-family:var(--mono);font-size:11px;color:var(--dim);min-width:34px;text-align:right">${(+w).toFixed(1)}×</span></div>`;
  }).join('');
  openModal(`<h2>Weekly self-review</h2>
    <p class="mnote">Week of ${fmtDateLabel(weekKeyNow())} · rate each 1–5</p>
    ${rows}
    <div class="adv-section">
      <button class="adv-toggle" onclick="_revAdvanced=!_revAdvanced;document.getElementById('advBody').style.display=_revAdvanced?'block':'none';this.querySelector('span').textContent=_revAdvanced?'▾':'▸'">Advanced — category weights <span>▸</span></button>
      <div id="advBody" style="display:none">
        <p class="mnote" style="margin:10px 0">Weights shape your weekly rating. Even by default.</p>
        ${weightRows}
      </div>
    </div>
    <button class="btn" style="margin-top:16px" onclick="saveReview()">Save review</button>

function setRevScore(cid,n){_revDraft.scores[cid]=n;renderReviewEntry();}
function toggleRevNote(cid){const el=document.getElementById('revnote_'+cid);el.style.display=el.style.display==='none'?'block':'none';if(el.style.display==='block')el.focus();}
function reviewWeeklyRating(r){
  // weighted avg of category scores (1..5) → 0..1
  let sum=0,wsum=0;
  S_reviewCats.forEach(c=>{const s=r.scores[c.id];if(s){const w=r.weights&&r.weights[c.id]!=null?r.weights[c.id]:1;sum+=s*w;wsum+=w;}});
  // also include scores for cats that may have been deleted but exist in the review
  Object.keys(r.scores).forEach(cid=>{if(!S_reviewCats.find(c=>c.id===cid)){const w=r.weights&&r.weights[cid]!=null?r.weights[cid]:1;sum+=r.scores[cid]*w;wsum+=w;}});
  return wsum?(sum/wsum)/5:0;
}
async function saveReview(){
  const scored=Object.values(_revDraft.scores).filter(Boolean).length;
  if(!scored){toast('Rate at least one category');return;}
  await dbPut('reviews',_revDraft);
  const i=S_reviews.findIndex(r=>r.id===_revDraft.id);
  if(i>=0)S_reviews[i]=_revDraft;else S_reviews.unshift(_revDraft);
  closeModal();celebrate();toast('Review saved');renderReview(document.getElementById('main'));
}
function reviewDiary(){
  const sorted=[...S_reviews].sort((a,b)=>b.weekKey<a.weekKey?-1:1);
  return `<div class="sess-scroll">${sorted.map(r=>{
    const rating=reviewWeeklyRating(r);
    const bar=S_reviewCats.map(c=>{const s=r.scores[c.id];if(!s)return '';return `<div class="seg" style="width:${100/Math.max(1,Object.keys(r.scores).length)}%;background:${c.colorHex};opacity:${0.3+s/5*0.7}" title="${esc(c.name)}: ${s}/5"></div>`;}).join('');
    return `<div class="sess-row">
      <div class="sess-meta"><span class="sess-date">Week of ${fmtDateLabel(r.weekKey)}</span><span class="sess-rating" style="color:${rating>=0.8?'var(--good)':rating>=0.5?'var(--accent)':'var(--bad)'}">${Math.round(rating*100)}%</span></div>
      <div class="sess-bar">${bar||'<div class="seg" style="background:var(--line)"></div>'}</div>
      <div class="sess-foot"><span>${Object.values(r.scores).filter(Boolean).length} categories</span><span onclick="editPastReview('${r.id}')" style="cursor:pointer;color:var(--accent)">edit</span></div>
    </div>`;
  }).join('')}</div>`;
}

/* ---------- custom color picker (swatches + hex entry, no native popup) ---------- */
const VIBE_SWATCHES=['#5b8fb0','#7fae8a','#e0a458','#d3713f','#b98bd1','#d86b8a','#6fbf9f','#7e87d6','#cf7b56','#5fa3c4','#c9a23f','#9bbd5f','#b8d4e8','#88c0a0','#e8c07a','#e89a6a','#d0a8e0','#e89ab0'];
function colorPicker(id,current){
  const swatches=VIBE_SWATCHES.map(c=>`<button type="button" class="vibe-sw ${c.toLowerCase()===current.toLowerCase()?'on':''}" style="background:${c}" onclick="pickVibe('${id}','${c}')"></button>`).join('');
  return `<input type="hidden" id="${id}" value="${current}">
    <div class="vibe-row" id="${id}_row">
      ${swatches}
      <button type="button" class="vibe-sw custom" id="${id}_toggle" style="background:conic-gradient(from 0deg,#e0a458,#d86b8a,#9bbd5f,#5b8fb0,#b98bd1,#e0a458)" title="custom hex" onclick="toggleHexEntry('${id}',event)"></button>
    </div>
    <div class="hex-entry" id="${id}_hex">
      <span class="hex-preview" id="${id}_prev" style="background:${current}"></span>
      <span class="hex-hash">#</span>
      <input type="text" id="${id}_hexin" maxlength="6" value="${current.replace('#','')}" placeholder="rrggbb" oninput="onHexInput('${id}',this.value)" spellcheck="false">
    </div>`;
}
function toggleHexEntry(id,e){if(e)e.stopPropagation();document.getElementById(id+'_hex').classList.toggle('open');}
function onHexInput(id,val){
  val=val.replace(/[^0-9a-fA-F]/g,'');
  if(val.length===6){const c='#'+val;document.getElementById(id+'_prev').style.background=c;pickVibe(id,c,true);}
}
function pickVibe(id,color,custom){
  document.getElementById(id).value=color;
  const row=document.getElementById(id+'_row');
  if(row)row.querySelectorAll('.vibe-sw').forEach(b=>b.classList.toggle('on',!b.classList.contains('custom')&&b.style.background.replace(/\s/g,'')===hexToRgb(color)));
  const prev=document.getElementById(id+'_prev');if(prev)prev.style.background=color;
  const hexin=document.getElementById(id+'_hexin');if(hexin&&!custom)hexin.value=color.replace('#','');
  if(id==='setFocus')document.documentElement.style.setProperty('--focus',color);
  if(id==='setBreak')document.documentElement.style.setProperty('--break',color);
}
function hexToRgb(hex){const h=hex.replace('#','');const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return `rgb(${(n>>16)&255},${(n>>8)&255},${n&255})`;}

/* ---------- category management ---------- */
function renderCatManage(){
  if(!S.categories.length)return '<div style="font-family:var(--mono);font-size:11.5px;color:var(--faint);padding:4px 0">No categories yet.</div>';

    <span class="cm-dot" style="background:${c.colorHex}"></span>
    <span class="cm-name">${esc(c.name)}</span>
    <button class="cm-btn" onclick="editCategory('${c.id}')">edit</button>
    <button class="cm-btn del" onclick="deleteCategory('${c.id}')">delete</button>
  </div>`).join('');
}
function addCatFromSettings(){
  openModal(`<h2>New category</h2>
    <label class="lbl">Name</label>
    <input class="fld" id="cmName" placeholder="e.g. Linear Algebra" style="margin-bottom:14px">

}
async function commitCatSettings(){

function editCategory(id){
  const c=S.categories.find(x=>x.id===id);if(!c)return;
  openModal(`<h2>Edit category</h2>
    <label class="lbl">Name</label>
    <input class="fld" id="cmName" value="${esc(c.name)}" style="margin-bottom:14px">
    <label class="lbl">Color</label>
    ${colorPicker('cmColor',c.colorHex)}

    <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}
async function commitEditCat(id){
  const c=S.categories.find(x=>x.id===id);if(!c)return;
  c.name=document.getElementById('cmName').value.trim()||c.name;
  c.colorHex=document.getElementById('cmColor').value;
  await dbPut('categories',c);
  closeModal();renderSettings(document.getElementById('main'));
}
function deleteCategory(id){
  const c=S.categories.find(x=>x.id===id);if(!c)return;
  const used=S.tasks.filter(t=>t.category===id&&!t.archived).length;
  openModal(`<h2>Delete "${esc(c.name)}"?</h2>
    <p class="mnote">${used>0?`${used} active task${used>1?'s':''} use this category — they'll become uncategorized.`:'This category is not used by any active tasks.'}</p>
    <button class="btn" style="background:var(--bad);color:#fff" onclick="doDeleteCat('${id}')">Delete</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}
async function doDeleteCat(id){
  await dbDel('categories',id);
  S.categories=S.categories.filter(x=>x.id!==id);
  // orphan tasks → uncategorized
  for(const t of S.tasks.filter(t=>t.category===id)){t.category=null;await dbPut('tasks',t);}
  closeModal();renderSettings(document.getElementById('main'));
}

function confirmReset(){
  openModal(`<h2 style="color:var(--bad)">Reset everything?</h2>
    <p class="mnote">This permanently erases all your sessions, tasks, categories, goals, and settings.<br><br>To protect you, a full backup will download automatically the moment you confirm. Your data isn't truly gone unless you delete that file — so if you change your mind, just import it back.</p>
    <button class="btn" style="background:var(--bad);color:#fff" onclick="doReset()">Download backup & reset</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}
async function doReset(){
  await exportData();                 // forced safety backup first
  await new Promise(r=>setTimeout(r,400));  // let the download fire
  for(const store of ['sessions','tasks','categories','goals','reviews','reviewCats','kv']){
    await dbClear(store);
  }
  // reset in-memory state to defaults
  S.categories=[];S.tasks=[];
  S.settings={focusMin:50,breakMin:10,sound:'chime',volume:0.7,focusColor:'#5b8fb0',breakColor:'#7fae8a',theme:'dark',weights:{adherence:0.5,ratio:0.3,consistency:0.2}};
  document.body.dataset.theme='dark';
  document.documentElement.style.setProperty('--focus',S.settings.focusColor);
  document.documentElement.style.setProperty('--break',S.settings.breakColor);
  setupSelTasks.clear();
  closeModal(); toast('Reset complete — backup downloaded'); go('focus');
}
async function seedDemo(){
  const fL=50*60,bL=10*60;
  let made=0;
  for(let i=70;i>=0;i--){
    if(Math.random()<0.28)continue;
    const day=new Date();day.setDate(day.getDate()-i);day.setHours(8+Math.floor(Math.random()*11),0,0,0);
    // vary "effort level" per day so duration & quality spread realistically
    const effort=Math.random();                      // 0..1 day quality
    const blocks=1+Math.floor(effort*4+Math.random());
    const sloppy=Math.random()<0.3;                  // some erratic days
    const intervals=[];let net=0;
    for(let b=0;b<blocks;b++){
      const jitter=sloppy?(0.4+Math.random()*1.1):(0.85+Math.random()*0.3);
      const fa=fL*jitter; intervals.push({type:'focus',planned:fL,actual:fa});net+=fa;
      if(b<blocks-1){const bj=sloppy?(0.8+Math.random()*1.8):(0.7+Math.random()*0.7);intervals.push({type:'break',planned:bL,actual:bL*bj});}
    }
    const rating=rateIntervals(intervals,fL,bL,S.settings.weights);
    const pauses=Math.random()<0.45?Array.from({length:1+Math.floor(Math.random()*3)},()=>({start:day.getTime(),duration:60+Math.random()*400})):[];
    const rec={id:uid()+i,startedAt:day.getTime(),endedAt:day.getTime()+net*1000,dayKey:dayKeyOf(day.getTime()),
      focusLen:fL,breakLen:bL,intervals,pauses,tasks:[],netStudy:net,totalTime:net+pauses.reduce((a,p)=>a+p.duration,0),
      totalPause:pauses.reduce((a,p)=>a+p.duration,0),rating,qualityAdjusted:net*rating,
      questions:Math.floor(effort*30),mood:Math.max(1,Math.min(5,Math.round(1+effort*4+(Math.random()-0.5)))),note:''};
    await dbPut('sessions',rec);made++;
  }
  _sessionsCache=null; toast(`Demo: ${made} sessions added`); go('dashboard');
}
async function saveSettings(){
  S.settings.focusColor=document.getElementById('setFocus').value;
  S.settings.breakColor=document.getElementById('setBreak').value;
  S.settings.volume=+document.getElementById('setVol').value;
  await kvSet('settings',S.settings); toast('Saved');
}
async function exportData(){
  const data={sessions:await dbAll('sessions'),tasks:await dbAll('tasks'),categories:await dbAll('categories'),goals:await dbAll('goals'),reviews:await dbAll('reviews'),reviewCats:await dbAll('reviewCats'),settings:S.settings};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='focus-backup-'+dayKeyOf(Date.now())+'.json';a.click();
}
async function importData(file){
  if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    for(const s of (data.sessions||[]))await dbPut('sessions',s);
    for(const t of (data.tasks||[]))await dbPut('tasks',t);
    for(const c of (data.categories||[]))await dbPut('categories',c);
    for(const g of (data.goals||[]))await dbPut('goals',g);
    for(const r of (data.reviews||[]))await dbPut('reviews',r);
    for(const rc of (data.reviewCats||[]))await dbPut('reviewCats',rc);
    if(data.settings)await kvSet('settings',data.settings);
    await loadState(); toast('Imported'); go('focus');
  }catch(e){toast('Import failed');}
}

/* ============================================================
   helpers
   ============================================================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtClock(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function fmtMins(m){const h=Math.floor(m/60),mm=m%60;return h>0?`${h}h ${mm}m`:`${mm}m`;}
function dayKeyOf(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
const mean=avg;
function stdev(a){if(a.length<2)return 0;const m=mean(a);return Math.sqrt(mean(a.map(x=>(x-m)**2)));}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('scrim').classList.add('show');}
function closeModal(){document.getElementById('scrim').classList.remove('show');}
function openModal2(html){document.getElementById('modal2').innerHTML=html;document.getElementById('scrim2').classList.add('show');}
function closeModal2(){document.getElementById('scrim2').classList.remove('show');}
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeModal();});
document.getElementById('scrim2').addEventListener('click',e=>{if(e.target.id==='scrim2')closeModal2();});
document.addEventListener('click',e=>{
  const sel=document.getElementById('catSel');
  const list=document.getElementById('catList');
  if(!sel||!list||!list.classList.contains('open'))return;
  // ignore clicks whose target is inside the picker OR already detached from the DOM
  if(sel.contains(e.target)||!document.body.contains(e.target))return;
  list.classList.remove('open');
});

let toastT=null;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:12px;padding:11px 18px;border-radius:999px;z-index:400;transition:opacity .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)';document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',1800);
}

/* ============================================================
   boot
   ============================================================ */
async function loadState(){
  S.categories=await dbAll('categories');
  S.tasks=await dbAll('tasks');
  const saved=await kvGet('settings',null);
  if(saved)S.settings={...S.settings,...saved};
  document.body.dataset.theme=S.settings.theme||'dark';
  document.documentElement.style.setProperty('--focus',S.settings.focusColor);
  document.documentElement.style.setProperty('--break',S.settings.breakColor);
}
async function updateReviewBadge(){
  await loadReviewData();
  const btn=document.querySelector('#nav button[data-view="review"]');
  if(!btn)return;
  btn.classList.toggle('badged',reviewDue());
}
(async function boot(){
  try{ await dbOpen(); }catch(e){ DB.mem=true; }
  try{ await loadState(); }catch(e){ console.warn('loadState failed',e); }
  try{ await updateReviewBadge(); }catch(e){ console.warn('reviewBadge failed',e); }
  // ALWAYS render the UI, independent of storage state — never leave a blank page
  try{
    go('focus');
  }catch(e){
    console.error('render failed',e);
    var m=document.getElementById('main');
    if(m)m.innerHTML='<div class="page"><p style="color:var(--faint);font-family:var(--mono);font-size:13px;line-height:1.8;max-width:34em">focus hit a snag while starting up. Please reload the page. If it keeps happening, try opening it in a normal (non-private) browser tab.</p></div>';
  }
  if(DB.mem){ setTimeout(()=>toast("Storage unavailable — changes won't be saved this session"),1400); }
  // weekend nudge: if due and not on review page, gently surface it once
  try{ if(reviewDue()){setTimeout(()=>{if(view!=='review')toast('Weekend self-review is ready — tap Review');},1200);} }catch(e){}
})();
</script>
